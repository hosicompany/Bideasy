version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bideasy_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=bideasy
      - POSTGRES_PASSWORD=bideasy_pass
      - POSTGRES_DB=bideasy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bideasy_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
