services:
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bideasy_app
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      - DATABASE_MODE=postgresql
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
    volumes:
      - ../backend/models:/app/models:ro
      - ../backend/data/historical:/app/data/historical:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bideasy_celery
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info
    env_file:
      - ../backend/.env
    environment:
      - DATABASE_MODE=postgresql
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
    volumes:
      - ../backend/models:/app/models:ro
      - ../backend/data/historical:/app/data/historical:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: bideasy_db
    ports:
      # 로컬에서만 접근 (공유망에 약한 dev 기본 비번으로 5432 노출 방지)
      - "127.0.0.1:5432:5432"
    environment:
      - POSTGRES_USER=bideasy
      - POSTGRES_PASSWORD=bideasy_pass
      - POSTGRES_DB=bideasy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bideasy -d bideasy_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bideasy_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
