# Production Docker Compose — BidEasy
# Usage:
#   cp .env.production.example .env.production
#   # fill in real values in .env.production
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  app:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bideasy_app
    expose:
      - "8000"
    env_file:
      - .env.production
    environment:
      - DATABASE_MODE=postgresql
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - APP_ENV=production
      - LOG_FORMAT=json
    volumes:
      - ../backend/models:/app/models:ro
      - ../backend/data/historical:/app/data/historical:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bideasy_celery
    command: celery -A app.core.celery_app:celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env.production
    environment:
      - DATABASE_MODE=postgresql
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - APP_ENV=production
      - LOG_FORMAT=json
      # 컨테이너 내부에서 root 로 실행 중이라 Celery 가 거부함. 격리된 컨테이너 환경에서는
      # root 실행이 일반적이므로 명시적으로 허용. (장기적으로는 Dockerfile 에 비-root USER
      # 디렉터티브 추가가 더 정석)
      - C_FORCE_ROOT=true
    volumes:
      - ../backend/models:/app/models:ro
      - ../backend/data/historical:/app/data/historical:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    # Dockerfile 의 HEALTHCHECK 가 curl localhost:8000/health 인데 celery worker 는 HTTP 가
    # 아니므로 항상 실패하여 (unhealthy) 로 표시되던 문제 해결. inspect ping 으로 실제 worker
    # 응답성을 확인.
    healthcheck:
      test:
        - "CMD-SHELL"
        - "celery -A app.core.celery_app:celery_app inspect ping --timeout=10 -d celery@$$HOSTNAME || exit 1"
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  # Celery beat — 정기 스케줄러. 이 서비스가 없으면 celery_app.py 의
  # beat_schedule(주간 자가보정 등)이 실제로 트리거되지 않는다.
  celery_beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: bideasy_celery_beat
    command: >-
      celery -A app.core.celery_app:celery_app beat --loglevel=info
      --schedule=/app/celerybeat/celerybeat-schedule.db
      --pidfile=
    env_file:
      - .env.production
    environment:
      - DATABASE_MODE=postgresql
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
      - APP_ENV=production
      - LOG_FORMAT=json
      - C_FORCE_ROOT=true
    volumes:
      - ../backend/models:/app/models:ro
      - ../backend/data/historical:/app/data/historical:ro
      # 마지막 실행 시각 영속화 — 컨테이너 재시작 시 스케줄 중복/누락 방지
      - celerybeat_data:/app/celerybeat
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    # celery beat 는 HTTP 서버가 아니고, 외부에서 health 를 확인할 수단이 마땅치 않음.
    # 프로세스 alive 만으로 충분 (restart: always 가 죽으면 자동 재시작). 잘못된 HTTP
    # healthcheck 가 unhealthy 로 표시되는 것 방지하려고 비활성.
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  db:
    image: postgres:15-alpine
    container_name: bideasy_db
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-bideasy}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-bideasy_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bideasy} -d ${POSTGRES_DB:-bideasy_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: bideasy_redis
    expose:
      - "6379"
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  nginx:
    image: nginx:alpine
    container_name: bideasy_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${NGINX_CONF_DIR:-./nginx/conf.d-http}:/etc/nginx/conf.d:ro
      - ./nginx/html:/var/www/html:ro
      - certbot_webroot:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: always

  certbot:
    image: certbot/certbot
    container_name: bideasy_certbot
    volumes:
      - certbot_webroot:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Run renewal check every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

volumes:
  postgres_data:
  redis_data:
  certbot_webroot:
  certbot_certs:
  celerybeat_data:
