# HTTP — redirect to HTTPS + ACME challenge (bideasy.kr / www / api 모두 처리)
# api.bideasy.kr 의 ACME 검증도 같이 받아주기 위해 server_name 에 포함.
# api 의 HTTPS 블록은 별도 파일(api.bideasy.kr.conf)에 두고, cert 발급 후 활성화.
server {
    listen 80;
    server_name bideasy.kr www.bideasy.kr api.bideasy.kr;

    # Let's Encrypt challenge (^~ ensures priority over regex location)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — www → apex 301 (중복 색인 방지, SEO 단일 도메인)
server {
    listen 443 ssl;
    http2 on;
    server_name www.bideasy.kr;

    ssl_certificate /etc/letsencrypt/live/bideasy.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bideasy.kr/privkey.pem;

    return 301 https://bideasy.kr$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    http2 on;
    server_name bideasy.kr;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/bideasy.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bideasy.kr/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # API endpoints
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
        proxy_send_timeout 30s;
    }

    # Auth endpoints — stricter rate limit
    location /api/v1/auth/ {
        limit_req zone=auth burst=3 nodelay;

        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
    }

    # OAuth callbacks
    location /auth/callback/ {
        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Payment callbacks
    location /api/v1/payments/ {
        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 공고 상세 SSR (/bid/{공고번호}) — 백엔드 Jinja2 렌더 (SEO 롱테일)
    # catch-all location / 보다 prefix 가 길어 우선 매칭됨.
    location /bid/ {
        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # SEO — sitemap / robots (백엔드 생성)
    location = /sitemap.xml {
        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
    }
    location = /robots.txt {
        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
    }

    # 개인정보처리방침 — GitHub Pages 로 리다이렉트 (단일 소스 유지)
    location = /privacy {
        return 302 https://hosicompany.github.io/bideasy-policy/;
    }

    # 블로그 SSR (/blog, /blog/{slug}) — 백엔드 Jinja2 렌더 (SEO 콘텐츠)
    location = /blog {
        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
    location /blog/ {
        proxy_pass http://bideasy_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # 정적 페이지 (Landing / Login 등)
    # bideasy.kr 을 Lightsail 로 가져오면서 단일 도메인에 모든 페이지 제공.
    # try_files: /foo 요청 시 /foo, /foo.html, /foo/ 순으로 시도.
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
