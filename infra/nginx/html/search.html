<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나라장터 입찰공고 검색 — 공사·용역·물품 | BidEasy</title>
  <meta name="description" content="나라장터(G2B) 입찰공고를 키워드·종류·지역으로 무료 검색. 공사·용역·물품 통합 피드, 투찰가 계산과 마감 추적까지 한 번에.">
  <link rel="canonical" href="https://bideasy.kr/search">
  <meta property="og:type" content="website">
  <meta property="og:title" content="나라장터 입찰공고 검색 — BidEasy">
  <meta property="og:description" content="공사·용역·물품 공고를 키워드·지역으로 무료 검색해요.">
  <meta property="og:url" content="https://bideasy.kr/search">
  <meta property="og:site_name" content="BidEasy">
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>html,body{margin:0;}</style>
  <script src="/assets/app.js"></script>
</head>
<body class="bd" data-theme="light">
  <div id="nav"></div>

  <div style="max-width:920px;margin:0 auto;padding:32px 28px 64px;">
    <span class="eyebrow">Smart Discovery</span>
    <h1 style="font-size:30px;font-weight:800;letter-spacing:-0.8px;margin:8px 0 0;">공고 검색</h1>
    <p style="font-size:15px;color:var(--muted);margin-top:6px;">나라장터 공사·용역·물품 공고를 한 곳에서. 종류·지역·키워드로 찾아보세요.</p>

    <div class="card" style="display:flex;align-items:center;gap:10px;padding:4px 6px 4px 16px;margin-top:20px;">
      <span style="color:var(--faint);display:flex;" id="search-ic"></span>
      <input id="q" placeholder="공고명·기관명·지역으로 검색" style="flex:1;border:none;outline:none;background:transparent;font-size:15px;font-family:var(--font-sans);color:var(--ink);padding:11px 0;">
      <button class="btn btn-primary btn-sm" id="searchbtn">검색</button>
    </div>

    <div id="filters" style="display:flex;align-items:center;gap:8px;margin-top:16px;flex-wrap:wrap;"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin:24px 2px 12px;">
      <span class="micro" id="result-count">검색 결과</span>
      <span class="micro" style="color:var(--faint);">마감 임박순</span>
    </div>
    <div id="list" style="display:flex;flex-direction:column;gap:12px;"></div>
  </div>

  <script>
  (function () {
    var BD = window.BD;
    BD.mountNav('search');
    var API_BASE = BD.API_BASE;
    document.getElementById('search-ic').innerHTML = BD.icon('search', 18);

    var TYPE_KO = { CONSTRUCTION: '공사', SERVICE: '용역', GOODS: '물품' };
    var CAT_MAP = { CONSTRUCTION: 'construction', SERVICE: 'service', GOODS: 'goods' };
    var state = { q: '', type: 'ALL' };
    var NOTICES = [];
    var favs = BD.getFavs();

    function dday(endDate) { if (!endDate) return null; var d = new Date(endDate); if (isNaN(d)) return null; return Math.ceil((d - new Date()) / 86400000); }

    function chip(active, label, id) {
      return '<button data-f="' + id + '" class="chip" style="padding:8px 13px;cursor:pointer;border:1px solid ' + (active ? 'var(--accent)' : 'var(--line-2)') + ';background:' + (active ? 'var(--accent-soft)' : 'var(--surface)') + ';color:' + (active ? 'var(--accent)' : 'var(--muted)') + ';font-weight:600;">' + label + '</button>';
    }
    function renderFilters() {
      var f = document.getElementById('filters');
      var tabs = [['ALL', '전체'], ['CONSTRUCTION', '공사'], ['SERVICE', '용역'], ['GOODS', '물품']];
      f.innerHTML = '<span style="color:var(--faint);display:flex;">' + BD.icon('filter', 15) + '</span>' +
        tabs.map(function (t) { return chip(state.type === t[0], t[1], 't:' + t[0]); }).join('');
      f.querySelectorAll('[data-f]').forEach(function (b) {
        b.addEventListener('click', function () { state.type = b.getAttribute('data-f').slice(2); renderFilters(); loadFeed(); });
      });
    }
    function card(n) {
      var dc = (n.dday != null && n.dday <= 1) ? 'danger' : (n.dday != null && n.dday <= 3) ? 'warn' : 'neutral';
      var ddTxt = (n.dday == null) ? '—' : (n.dday < 0 ? '마감' : 'D-' + n.dday);
      var isFav = favs.has(n.id);
      return '<div class="card" data-id="' + n.id + '" style="padding:18px 20px;display:flex;align-items:center;gap:18px;cursor:pointer;">' +
        '<div style="flex:1;min-width:0;">' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;"><span class="chip chip-neutral">' + (TYPE_KO[n.type] || '공고') + '</span>' +
          (n.region ? '<span class="micro" style="font-size:10px;">' + n.region + '</span>' : '') + '</div>' +
          '<div style="font-size:15.5px;font-weight:700;letter-spacing:-0.3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (n.title || '(제목 없음)') + '</div>' +
          '<div style="font-size:13px;color:var(--muted);margin-top:5px;">' + (n.agency || '—') + ' · 공고 ' + n.id + '</div>' +
        '</div>' +
        '<div style="text-align:right;flex-shrink:0;"><div class="micro" style="font-size:9.5px;">기초금액</div>' +
          '<div class="num" style="font-size:17px;font-weight:600;margin-top:3px;">' + (n.basic ? BD.won(n.basic) : '—') + '</div>' +
          '<div class="chip chip-' + dc + '" style="margin-top:8px;font-family:var(--font-mono);">' + ddTxt + '</div></div>' +
        '<button class="btn btn-quiet btn-sm fav" data-fav="' + n.id + '" style="padding:8px;flex-shrink:0;color:' + (isFav ? 'var(--accent)' : 'var(--faint)') + ';" title="즐겨찾기">' +
          '<span style="display:flex;' + (isFav ? 'fill:var(--accent);' : '') + '">' + BD.icon('star', 18) + '</span></button>' +
        '</div>';
    }
    function renderList() {
      document.getElementById('result-count').textContent = '검색 결과 · ' + NOTICES.length + '건';
      var host = document.getElementById('list');
      if (!NOTICES.length) { host.innerHTML = '<div class="panel" style="padding:48px;text-align:center;"><div class="micro" style="margin-bottom:8px;">EMPTY</div><p style="font-size:15px;color:var(--muted);">조건에 맞는 공고가 없어요. 검색어·필터를 바꿔보세요.</p></div>'; return; }
      host.innerHTML = NOTICES.map(card).join('');
      host.querySelectorAll('.card').forEach(function (c) {
        c.addEventListener('click', function () { location.href = '/bid.html?no=' + encodeURIComponent(c.getAttribute('data-id')); });
      });
      host.querySelectorAll('.fav').forEach(function (b) {
        b.addEventListener('click', function (e) {
          e.stopPropagation();
          var added = BD.toggleFav(b.getAttribute('data-fav')); favs = BD.getFavs();
          BD.toast(added ? '즐겨찾기에 담았어요' : '즐겨찾기에서 뺐어요', added ? 'accent' : 'danger');
          renderList();
        });
      });
    }

    function skeleton() {
      var s = '';
      for (var i = 0; i < 4; i++) s += '<div class="card" style="padding:18px 20px;height:58px;"><div class="skel" style="height:14px;width:60%;border-radius:6px;"></div><div class="skel" style="height:11px;width:38%;border-radius:6px;margin-top:10px;"></div></div>';
      return s;
    }

    var seq = 0;
    async function loadFeed() {
      var my = ++seq;
      var host = document.getElementById('list');
      host.innerHTML = skeleton();
      var p = new URLSearchParams();
      if (state.q) p.set('keyword', state.q);
      if (state.type !== 'ALL') p.set('category', CAT_MAP[state.type]);
      p.set('sort', 'deadline'); p.set('exclude_closed', 'true'); p.set('limit', '40');
      try {
        var resp = await fetch(API_BASE + '/bids/feed?' + p.toString());
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        var data = await resp.json();
        if (my !== seq) return; // 최신 요청만 반영
        var items = (data && data.items) ? data.items : (Array.isArray(data) ? data : []);
        NOTICES = items.map(function (it) {
          return {
            id: it.bid_no || it.bidNtceNo || '',
            type: it.contract_type || it.bid_type || 'CONSTRUCTION',
            title: it.title, agency: it.organization,
            region: it.region, basic: it.basic_price != null ? it.basic_price : it.estimated_price,
            dday: dday(it.end_date),
          };
        });
        renderList();
      } catch (e) {
        if (my !== seq) return;
        host.innerHTML = '<div class="panel" style="padding:40px;text-align:center;"><p style="font-size:14.5px;color:var(--danger);">공고를 불러오지 못했어요. 잠시 후 다시 시도해주세요.</p></div>';
        document.getElementById('result-count').textContent = '검색 결과';
      }
    }

    var debounce;
    document.getElementById('q').addEventListener('input', funct
