    <rect x="40" y="214" width="820" height="46" rx="23" fill="#FBEAE2"/>
    <text x="450" y="243" fill="#C2410C" font-size="17" font-weight="800" text-anchor="middle">차이 약 491만 원 &#8212; 낙찰과 마진을 가른다</text>
