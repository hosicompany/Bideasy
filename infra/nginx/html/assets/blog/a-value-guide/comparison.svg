<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" role="img" aria-label="A값 무시하면 8억 7745만, 분리하면 8억 8236만, 차이 약 491만원">
  <rect width="900" height="280" rx="16" fill="#F4F6FF"/>
  <g font-family="'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif">
    <text x="40" y="52" fill="#16203A" font-size="17" font-weight="800">10억 공사 &#183; A값 4천만 원 &#183; 투찰률 87.745% 기준</text>
    <rect x="40" y="74" width="820" height="56" rx="12" fill="#ffffff"/>
