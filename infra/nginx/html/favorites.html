<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관심공고 — BidEasy</title>
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>html,body{margin:0;}</style>
  <script src="/assets/app.js"></script>
</head>
<body class="bd" data-theme="light">
  <div id="nav"></div>
  <div style="max-width:880px;margin:0 auto;padding:32px 28px 64px;">
    <span class="eyebrow">Favorites</span>
    <h1 style="font-size:30px;font-weight:800;letter-spacing:-0.8px;margin:8px 0 0;">관심공고</h1>
    <p style="font-size:15px;color:var(--muted);margin-top:6px;">★로 담은 공고를 모아봅니다. 마감 알림·투찰가 계산으로 바로 이어가세요.</p>
    <div id="list" style="margin-top:24px;"></div>
  </div>

  <script>
  (function () {
    var BD = window.BD; BD.mountNav();
    var API_BASE = BD.API_BASE;
    var host = document.getElementById('list');
    var TKO = { CONSTRUCTION: '공사', SERVICE: '용역', GOODS: '물품' };

    function emptyState() {
      return '<div class="panel" style="padding:56px 24px;text-align:center;"><span style="color:var(--faint);display:inline-flex;">' + BD.icon('star', 28) + '</span>' +
        '<p style="font-size:15px;color:var(--muted);margin-top:14px;line-height:1.6;">아직 관심공고가 없어요.<br>공고 검색에서 ★를 눌러 담아보세요.</p>' +
        '<a class="btn btn-primary btn-sm" style="margin-top:16px;" href="/search">공고 검색하러 가기</a></div>';
    }
    function card(n) {
      return '<div class="card" data-id="' + n.id + '" style="padding:18px 20px;">' +
        '<div style="display:flex;align-items:flex-start;gap:14px;">' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">' + (n.type ? '<span class="chip chip-neutral">' + (TKO[n.type] || '공고') + '</span>' : '') + '<span class="micro" style="font-size:9.5px;">공고 ' + n.id + '</span></div>' +
            '<a href="/bid.html?no=' + encodeURIComponent(n.id) + '" style="font-size:15.5px;font-weight:700;letter-spacing:-0.3px;text-decoration:none;color:var(--ink);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + n.title + '</a>' +
            '<div class="num" style="font-size:13.5px;color:var(--muted);margin-top:6px;">기초금액 ' + (n.basic ? BD.won(n.basic) + '원' : '—') + '</div>' +
          '</div>' +
          '<button class="btn btn-quiet btn-sm rm" data-id="' + n.id + '" style="color:var(--faint);flex-shrink:0;">해제</button>' +
        '</div>' +
        '<div style="display:flex;gap:8px;margin-top:14px;"><a class="btn btn-ghost btn-sm" href="/bid.html?no=' + encodeURIComponent(n.id) + '">상세 보기</a><a class="btn btn-primary btn-sm" href="/calculator.html?no=' + encodeURIComponent(n.id) + '">투찰가 계산</a></div>' +
      '</div>';
    }
    function render() {
      var ids = Array.from(BD.getFavs());
      if (!ids.length) { host.innerHTML = emptyState(); return; }
      host.innerHTML = '<div class="skel" style="height:96px;border-radius:16px;"></div>';
      Promise.all(ids.map(function (id) {
        return fetch(API_BASE + '/bids/' + encodeURIComponent(id) + '/context').then(function (r) { return r.ok ? r.json() : null; }).then(function (c) {
          return { id: id, title: (c && c.title) || ('공고 ' + id), basic: c && c.estimated_price, type: (c && c.contract_type) || null };
        }).catch(function () { return { id: id, title: '공고 ' + id, basic: null, type: null }; });
      })).then(function (rows) {
        host.innerHTML = '<div style="display:flex;flex-direction:column;gap:12px;">' + rows.map(card).join('') + '</div>';
        host.querySelectorAll('.rm').forEach(function (b) {
          b.addEventListener('click', function (e) {
            e.preventDefault(); BD.toggleFav(b.getAttribute('data-id'));
            BD.toast('관심공고에서 뺐어요', 'danger'); render();
          });
        });
      });
    }
    render();
  })();
  </script>
</body>
</html>
