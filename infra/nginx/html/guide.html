<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사용 가이드 — BidEasy</title>
  <meta name="description" content="BidEasy 사용법 — 설치부터 투찰가 계산·AI 분석·마감 알림·자격 매칭까지 5단계.">
  <link rel="canonical" href="https://bideasy.kr/guide">
  <meta property="og:type" content="website">
  <meta property="og:title" content="사용 가이드 — BidEasy">
  <meta property="og:description" content="설치부터 투찰가 계산·AI 분석·마감 알림까지 5단계로 알려드려요.">
  <meta property="og:url" content="https://bideasy.kr/guide">
  <meta property="og:site_name" content="BidEasy">
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>
    html,body{margin:0;}
    details.faq{border:1px solid var(--line);border-radius:12px;padding:0 18px;background:var(--surface);}
    details.faq+details.faq{margin-top:10px;}
    details.faq summary{list-style:none;cursor:pointer;padding:16px 0;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
    details.faq summary::-webkit-details-marker{display:none;}
    details.faq summary .mk{transition:transform .18s;color:var(--faint);display:flex;}
    details.faq[open] summary .mk{transform:rotate(180deg);}
    details.faq p{margin:0 0 16px;font-size:14px;color:var(--muted);line-height:1.7;}
  </style>
  <script src="/assets/app.js"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V4ERRL0NH0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-V4ERRL0NH0');
  </script>
</head>
<body class="bd" data-theme="light">
  <div id="nav"></div>

  <div style="max-width:780px;margin:0 auto;padding:48px 28px 72px;">
    <div style="text-align:center;">
      <span class="eyebrow">Guide</span>
      <h1 class="h-sec" style="font-weight:800;letter-spacing:-0.8px;margin:10px 0 0;">5단계면 충분해요</h1>
      <p style="font-size:16px;color:var(--muted);margin-top:10px;line-height:1.6;">설치부터 안전 투찰까지. 사장님이 매일 하던 일을 사이드패널 하나로.</p>
    </div>

    <div id="steps" style="margin-top:48px;display:flex;flex-direction:column;gap:16px;"></div>

    <div style="margin-top:56px;">
      <h2 style="font-size:20px;font-weight:800;letter-spacing:-0.5px;text-align:center;margin-bottom:22px;">자주 묻는 질문</h2>
      <div id="faq"></div>
    </div>

    <div style="margin-top:48px;border-radius:20px;padding:36px 28px;text-align:center;background:var(--accent);color:var(--on-accent);position:relative;overflow:hidden;">
      <div class="grid-bg" style="position:absolute;inset:0;opacity:.4;--grid-line:rgba(255,255,255,0.12);"></div>
      <div style="position:relative;">
        <h2 style="font-size:24px;font-weight:800;letter-spacing:-0.5px;">지금 바로 시작하세요</h2>
        <p style="font-size:15px;opacity:.9;margin:10px 0 22px;">신규 가입 시 Pro 14일 무료 · 카드 불필요</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <a class="btn btn-lg" style="background:var(--surface);color:var(--accent);" href="https://chromewebstore.google.com/detail/ecdpfnfonccaaneihkdlkhnkpjakmmnp" target="_blank" rel="noopener">Chrome에 설치</a>
          <a class="btn btn-lg" style="background:transparent;color:var(--on-accent);border:1.5px solid rgba(255,255,255,.5);" href="/signup">14일 무료 체험</a>
        </div>
      </div>
    </div>
  </div>

  <script>
  (function () {
    var BD = window.BD; BD.mountNav();
    var STEPS = [
      ['shield', 'Chrome 익스텐션 설치', '웹스토어에서 BidEasy를 설치하면 나라장터 공고 페이지 위에 분석 사이드패널이 자동으로 떠요.', '설치 후 한 번 로그인하면 익스텐션·웹앱이 계정을 공유합니다.'],
      ['bolt', '투찰가 계산', '공고를 열면 기초금액이 자동으로 잡혀요. 슬라이더로 투찰률만 옮기면 1원 단위 투찰가가 실시간으로. 낙찰하한선 미달 시 빨간 경고.', 'A값(사후정산)은 공고문/첨부에서 자동 추정하거나 직접 입력할 수 있어요.'],
      ['doc', 'AI 공고 분석', 'GPT 분석가가 공고문 전체를 읽고 핵심 3줄 요약과 독소조항(이행보증·지체상금 등)을 뽑아줘요. 30초면 할 만한 공고인지 판단.', '낙찰가는 찍지 않아요 — 판단을 돕는 비서 역할에 집중합니다.'],
      ['bell', '마감 알림 · 즐겨찾기', '관심 공고를 ★로 담아두면 마감 1시간·15분 전 자동 푸시. 놓쳐서 못 넣는 입찰이 없도록.', '대시보드의 마감 추적에서 한눈에 관리할 수 있어요.'],
      ['user', '자격 자동 매칭', '회사 정보(면허·지역·시공능력·실적)를 한 번 등록하면, 모든 공고에서 참여 가능 여부를 적합/조건부/부적합으로 자동 표시.', '헛심 입찰을 줄이고 참여 가능한 공고만 빠르게 선별하세요.'],
    ];
    document.getElementById('steps').innerHTML = STEPS.map(function (s, i) {
      return '<div class="card" style="padding:24px;display:flex;gap:18px;align-items:flex-start;">' +
        '<span class="num" style="flex-shrink:0;width:40px;height:40px;border-radius:11px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;font-weight:700;font-size:15px;">0' + (i + 1) + '</span>' +
        '<div style="flex:1;"><div style="display:flex;align-items:center;gap:8px;"><span style="color:var(--accent);display:flex;">' + BD.icon(s[0], 17) + '</span><h3 style="font-size:18px;font-weight:800;margin:0;">' + s[1] + '</h3></div>' +
        '<p style="font-size:14.5px;color:var(--muted);line-height:1.7;margin:10px 0 0;">' + s[2] + '</p>' +
        '<div style="margin-top:12px;display:flex;gap:8px;padding:10px 13px;border-radius:10px;background:var(--sunken);font-size:13px;color:var(--ink-2);line-height:1.55;"><span style="color:var(--accent);flex-shrink:0;display:flex;margin-top:1px;">' + BD.icon('check', 13, 2) + '</span>' + s[3] + '</div></div></div>';
    }).join('');

    var FAQ = [
      ['낙찰가를 예측해 주나요?', '아니요. BidEasy는 무책임한 낙찰가 예측을 하지 않습니다. 대신 사정률·낙찰하한선·A값을 정확히 계산해 적자 수주를 막고, 공고 요약·독소조항·자격을 분석해 사장님의 판단을 돕습니다.'],
      ['무료로 어디까지 쓸 수 있나요?', 'Free 요금제로 투찰가 계산기·공고 피드·즐겨찾기·자격 매칭을 무제한 사용할 수 있고, AI 분석은 하루 1회 제공됩니다. Pro는 14일 무료 체험 후 결정하세요.'],
      ['A값이 무엇이고 왜 중요한가요?', 'A값은 국민연금·건강보험·노인장기요양·산재·고용보험 등 사후정산 비목의 합계예요. 투찰률이 적용되지 않아 별도로 분리해 계산해야 정확한 투찰가가 나옵니다. (공사에만 영향, 물품은 해당 없음)'],
      ['자가보정 알고리즘은 뭔가요?', '매주 새로 쌓이는 개찰 결과를 스스로 학습해 사정률 추천값을 재최적화하는 BidEasy만의 기술입니다. 회귀 가드가 성능 퇴행을 막아, 손대지 않아도 시간이 갈수록 정확해집니다.'],
    ];
    document.getElementById('faq').innerHTML = FAQ.map(function (f) {
      return '<details class="faq"><summary>' + f[0] + '<span class="mk">' + BD.icon('chevD', 14) + '</span></summary><p>' + f[1] + '</p></details>';
    }).join('');
  })();
  </script>
</body>
</html>
