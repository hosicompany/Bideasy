<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>요금제 — BidEasy</title>
  <meta name="description" content="BidEasy 요금제. Free·Pro·Pro+. 신용카드 없이 Pro 14일 무료 체험.">
  <link rel="canonical" href="https://bideasy.kr/pricing">
  <meta property="og:type" content="website">
  <meta property="og:title" content="요금제 — BidEasy">
  <meta property="og:description" content="Free·Pro·Pro+. 신용카드 없이 Pro 14일 무료 체험.">
  <meta property="og:url" content="https://bideasy.kr/pricing">
  <meta property="og:site_name" content="BidEasy">
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>html,body{margin:0;}</style>
  <script src="/assets/app.js"></script>
</head>
<body class="bd" data-theme="light">
  <div id="nav"></div>
  <div style="max-width:1000px;margin:0 auto;padding:40px 28px 64px;">
    <div style="text-align:center;">
      <span class="eyebrow">Pricing</span>
      <h1 style="font-size:34px;font-weight:800;letter-spacing:-1px;margin:10px 0 0;">필요한 만큼만, 정직하게</h1>
      <p style="font-size:16px;color:var(--muted);margin-top:10px;">신용카드 없이 Pro 14일 무료. 언제든 해지할 수 있어요.</p>
    </div>
    <div style="display:flex;justify-content:center;margin-top:26px;">
      <div class="seg" id="billing" style="width:260px;">
        <button class="active" data-b="m">월간</button>
        <button data-b="a">연간 <span style="color:var(--safe);font-family:var(--font-mono);font-size:12px;">−20%</span></button>
      </div>
    </div>
    <div class="g3" id="tiers" style="gap:16px;margin-top:28px;"></div>

    <div style="margin-top:48px;">
      <h2 style="font-size:20px;font-weight:800;letter-spacing:-0.5px;text-align:center;margin-bottom:20px;">기능 자세히 비교</h2>
      <div class="card bd-scroll" style="overflow-x:auto;"><div style="min-width:460px;" id="compare"></div></div>
    </div>
  </div>

  <script>
  (function () {
    var BD = window.BD; BD.mountNav('pricing');
    var annual = false;
    // 가격 상수 — backend/app/schemas/subscription.py 와 동일 (MONTHLY_PRICES/ANNUAL_PRICES)
    var TIERS = [
      { name: 'Free', code: null, m: 0, a: 0, tag: '영구 무료', cta: '무료로 시작', pop: false, feats: ['투찰가 계산기 무제한', '공고 피드 · 즐겨찾기', '자격 자동 매칭', 'AI 분석 일 1회'] },
      { name: 'Pro', code: 'pro', m: 24900, a: 239000, tag: '14일 무료 체험', cta: '14일 무료 체험', pop: true, feats: ['Free의 모든 기능', 'AI 분석 일 50회', 'Deep Analysis (HWP·PDF 첨부)', '경쟁 강도 예측', '투찰가 검증 · 개찰 결과 추적'] },
      { name: 'Pro+', code: 'pro_plus', m: 49900, a: 479000, tag: '연 결제 시 20% 할인', cta: 'Pro+ 시작', pop: false, feats: ['Pro의 모든 기능', 'AI 분석 무제한', '기관 프로파일링', '사정률 예측 ML', '스마트 투찰 추천'] }
    ];
    var COMPARE = [['투찰가 계산기', '무제한', '무제한', '무제한'], ['AI 공고 분석', '일 1회', '일 50회', '무제한'], ['Deep Analysis (첨부)', '—', '○', '○'], ['경쟁 강도 예측 · 투찰 검증', '—', '○', '○'], ['기관 프로파일링 · 사정률 ML', '—', '—', '○'], ['스마트 투찰 추천', '—', '—', '○']];

    function hrefFor(t) {
      if (!t.code) return '/signup';
      return '/checkout?tier=' + t.code + '&cycle=' + (annual ? 'annual' : 'monthly');
    }
    function renderTiers() {
      document.getElementById('tiers').innerHTML = TIERS.map(function (t) {
        var price = annual ? Math.round(t.a / 12) : t.m;
        var feats = t.feats.map(function (f) { return '<div style="display:flex;gap:9px;font-size:13.5px;color:var(--ink-2);"><span style="color:var(--safe);flex-shrink:0;margin-top:1px;display:flex;">' + BD.icon('check', 14, 2) + '</span>' + f + '</div>'; }).join('');
        return '<div class="card" style="padding:28px;position:relative;border-color:' + (t.pop ? 'var(--accent)' : 'var(--line)') + ';box-shadow:' + (t.pop ? 'var(--shadow-md)' : 'var(--shadow-sm)') + ';">' +
          (t.pop ? '<span class="chip chip-accent" style="position:absolute;top:-11px;left:28px;">가장 인기</span>' : '') +
          '<div style="font-size:20px;font-weight:800;">' + t.name + '</div>' +
          '<div style="margin-top:14px;display:flex;align-items:baseline;gap:4px;"><span class="num" style="font-size:34px;font-weight:600;letter-spacing:-1px;">' + BD.won(price) + '</span><span style="font-size:15px;color:var(--muted);font-weight:600;">원' + (t.m > 0 ? '/월' : '') + '</span></div>' +
          '<div style="font-size:12.5px;color:' + (t.pop ? 'var(--accent)' : 'var(--safe)') + ';font-weight:600;margin-top:5px;min-height:16px;">' + (annual && t.a > 0 ? '연 ' + BD.won(t.a) + '원 일시납' : t.tag) + '</div>' +
          '<a class="btn btn-block ' + (t.pop ? 'btn-primary' : 'btn-ghost') + '" style="margin-top:18px;" href="' + hrefFor(t) + '">' + t.cta + '</a>' +
          '<hr class="hr" style="margin:20px 0;"><div style="display:flex;flex-direction:column;gap:11px;">' + feats + '</div></div>';
      }).join('');
    }
    document.querySelectorAll('#billing button').forEach(function (b) {
      b.addEventListener('click', function () {
        document.querySelectorAll('#billing button').forEach(function (x) { x.classList.remove('active'); });
        b.classList.add('active'); annual = b.getAttribute('data-b') === 'a'; renderTiers();
      });
    });

    document.getElementById('compare').innerHTML =
      '<div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;background:var(--sunken);padding:14px 22px;"><span class="micro">기능</span>' + ['Free', 'Pro', 'Pro+'].map(function (h) { return '<span class="micro" style="text-align:center;">' + h + '</span>'; }).join('') + '</div>' +
      COMPARE.map(function (row) {
        return '<div style="display:grid;grid-template-columns:1.6fr 1fr 1fr 1fr;padding:14px 22px;border-top:1px solid var(--line);align-items:center;"><span style="font-size:13.5px;color:var(--ink-2);font-weight:600;">' + row[0] + '</span>' +
          row.slice(1).map(function (c) { return '<span style="text
