<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 — BidEasy</title>
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>html,body{margin:0;}</style>
  <script src="/assets/app.js"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V4ERRL0NH0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-V4ERRL0NH0');
  </script>
</head>
<body class="bd" data-theme="light">
  <div id="nav"></div>
  <div style="max-width:1040px;margin:0 auto;padding:32px 28px 64px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;">
      <div>
        <span class="eyebrow">Dashboard</span>
        <h1 id="greet" style="font-size:30px;font-weight:800;letter-spacing:-0.8px;margin:8px 0 0;">안녕하세요 👋</h1>
        <p id="subtitle" style="font-size:15px;color:var(--muted);margin-top:6px;">관심 공고와 마감을 한눈에 관리하세요.</p>
      </div>
      <a class="btn btn-primary btn-sm" href="/search" id="more"><span style="display:flex;gap:6px;align-items:center;">공고 더 보기</span></a>
    </div>
    <div class="g4" id="kpis" style="gap:14px;margin-top:24px;"></div>
    <div class="cols-dash" style="margin-top:20px;">
      <div class="card" style="padding:22px;">
        <div style="display:flex;align-items:center;justify-content:space-between;"><span style="font-size:15px;font-weight:800;white-space:nowrap;">마감 추적</span><span class="micro">관심 공고 기반</span></div>
        <div id="tracked" style="margin-top:8px;"></div>
      </div>
      <div data-theme="dark" class="card grid-bg" style="padding:22px;background:var(--canvas);color:var(--ink);">
        <span class="micro" style="color:var(--accent);">AUTOCALIBRATE</span>
        <div style="font-size:15px;font-weight:800;color:var(--ink);margin-top:6px;">이번 주 하한선 통과율</div>
        <div style="display:flex;align-items:baseline;gap:6px;margin-top:10px;"><span class="num" id="acal-pass" style="font-size:34px;font-weight:600;color:var(--safe);">94.9</span><span style="color:var(--muted);font-weight:600;">%</span></div>
        <div id="acal-bars" style="display:flex;align-items:flex-end;gap:5px;height:56px;margin-top:16px;"></div>
        <p style="font-size:12px;color:var(--muted);margin-top:12px;line-height:1.5;">매주 개찰 결과를 학습해 자동 재보정 중. 손대지 않아도 정확해집니다.</p>
      </div>
    </div>
    <div class="card" id="sub-strip" style="padding:22px;margin-top:20px;display:none;align-items:center;gap:20px;flex-wrap:wrap;"></div>
  </div>

  <script>
  (function () {
    var BD = window.BD; BD.mountNav('dashboard');
    var API_BASE = BD.API_BASE;
    document.getElementById('more').querySelector('span').insertAdjacentHTML('afterbegin', BD.icon('search', 14));

    function getToken() { return BD.getToken(); }
    if (!getToken()) { location.href = '/login?redirect=' + encodeURIComponent('/dashboard'); return; }
    async function api(path) {
      var resp = await fetch(API_BASE + path, { headers: { Authorization: 'Bearer ' + getToken() } });
      if (resp.status === 401) { try { localStorage.removeItem('access_token'); localStorage.removeItem('jwt'); } catch (e) {} location.href = '/login'; throw new Error('401'); }
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }

    var favs = BD.getFavs();

    function kpi(ic, n, unit, l, tone) {
      return '<div class="card" style="padding:18px;"><div style="display:flex;align-items:center;gap:8px;color:var(--' + (tone || 'accent') + ');">' + BD.icon(ic, 16) + '<span class="micro" style="color:var(--muted);">' + l + '</span></div><div style="display:flex;align-items:baseline;gap:3px;margin-top:12px;"><span class="num" style="font-size:30px;font-weight:600;letter-spacing:-1px;">' + n + '</span><span style="font-size:14px;color:var(--muted);font-weight:600;">' + unit + '</span></div></div>';
    }

    // 자가보정 막대(기본값) — stats 연동 시 갱신
    function renderBars(weekly) {
      document.getElementById('acal-bars').innerHTML = weekly.map(function (v, i, a) {
        return '<div style="flex:1;height:' + Math.max(6, v) + '%;border-radius:3px 3px 0 0;background:var(--' + (i === a.length - 1 ? 'safe' : 'accent') + ');opacity:' + (i === a.length - 1 ? 1 : 0.4 + i * 0.06) + ';"></div>';
      }).join('');
    }
    renderBars([64, 68, 72, 75, 79, 83, 86, 90, 94.9]);

    // 마감 추적 — localStorage 관심 공고를 컨텍스트로 조회(제목·기초금액). 상세로 링크.
    async function loadTracked() {
      var th = document.getElementById('tracked');
      var ids = Array.from(favs);
      if (!ids.length) {
        th.innerHTML = '<div class="panel" style="padding:28px 18px;text-align:center;margin-top:8px;"><span style="color:var(--faint);display:inline-flex;">' + BD.icon('star', 22) + '</span><p style="font-size:14px;color:var(--muted);margin-top:10px;line-height:1.6;">아직 관심 공고가 없어요.<br>★로 담아두면 여기서 관리할 수 있어요.</p><a class="btn btn-ghost btn-sm" style="margin-top:14px;" href="/search">공고 둘러보기</a></div>';
        return;
      }
      th.innerHTML = '<div class="skel" style="height:42px;border-radius:8px;margin-top:8px;"></div>';
      var rows = await Promise.all(ids.slice(0, 12).map(function (id) {
        return fetch(API_BASE + '/bids/' + encodeURIComponent(id) + '/context').then(function (r) { return r.ok ? r.json() : null; }).then(function (c) {
          return { id: id, title: (c && c.title) || ('공고 ' + id), basic: c && c.estimated_price };
        }).catch(function () { return { id: id, title: '공고 ' + id, basic: null }; });
      }));
      th.innerHTML = rows.map(function (n) {
        return '<a class="drow" href="/bid.html?no=' + encodeURIComponent(n.id) + '" style="cursor:pointer;align-items:center;text-decoration:none;"><span style="display:flex;align-items:center;gap:11px;min-width:0;"><span style="color:var(--accent);display:flex;flex-shrink:0;">' + BD.icon('star', 14) + '</span><span style="font-size:14px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + BD.esc(n.title) + '</span></span><span class="v">' + (n.basic ? BD.won(n.basic) : '—') + '</span></a>';
      }).join('');
    }

    // 구독 스트립 + KPI
    async function loadSub() {
      var sub = null; try { sub = await api('/payments/subscription'); } catch (e) {}
      var tierName = sub ? (sub.is_trial ? 'Pro 체험' : ({ free: 'Free', pro: 'Pro', pro_plus: 'Pro+' }[sub.tier] || 'Free')) : '—';
      var aiText = sub ? (sub.tier === 'free' && !sub.is_trial ? '1 / 일' : '무제한') : '—';

      document.getElementById('kpis').innerHTML =
        kpi('star', favs.size, '건', '관심 공고') +
        kpi('shield', tierName, '', '구독 등급', 'safe') +
        kpi('doc', aiText, '', 'AI 분석 한도') +
        kpi('chart', document.getElementById('acal-pass').textContent, '%', '자가보정 통과율', 'accent');

      // Pro 체험/유료 스트립
      var strip = document.getElementById('sub-strip');
      if (sub && sub.is_trial) {
        var d = sub.trial_days_remaining != null ? sub.trial_days_remaining : 0;
        strip.style.display = 'flex';
        strip.innerHTML = '<div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;"><span style="width:40px;height:40px;border-radius:11px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;">' + BD.icon('bolt', 18) + '</span><div><div style="font-size:15px;font-weight:800;">Pro 체험 중 · <span class="num" style="color:var(--accent);">D-' + d + '</span></div><div style="font-size:13px;color:var(--muted);margin-top:2px;">체험 종료 시 자동 Free 전환 · 카드 등록 없음</div></div></div><a class="btn btn-primary btn-sm" style="margin-left:auto;" href="/pricing">Pro 계속 쓰기</a>';
      } else if (sub && sub.is_active && sub.tier !== 'free') {
        strip.style.display = 'flex';
        strip.innerHTML = '<div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;"><span style="width:40px;height:40px;border-radius:11px;background:var(--safe-soft);color:var(--safe);display:grid;place-items:center;">' + BD.icon('shield', 18) + '</span><div><div style="font-size:15px;font-weight:800;">' + tierName + ' 구독 중</div><div style="font-size:13px;color:var(--muted);margin-top:2px;">마이페이지에서 결제·갱신을 관리할 수 있어요</div></div></div><a class="btn btn-ghost btn-sm" style="margin-left:auto;" href="/account">구독 관리</a>';
      }
    }

    // 인사말
    (async function () {
      try { var u = await api('/users/me'); var nm = u.company_name || u.ceo_name || (u.email ? u.email.split('@')[0] : ''); document.getElementById('greet').textContent = '안녕하세요, ' + (nm ? nm + ' ' : '') + '사장님 👋'; } catch (e) {}
    })();

    // 자가보정 통계(공개) — 있으면 라이브, 없으면 기본값
    fetch(API_BASE + '/autocalibrate/stats').then(function (r) { return r.ok ? r.json() : Promise.reject(); }).then(function (d) {
      if (d.passRate) document.getElementById('acal-pass').textContent = d.passRate.toFixed(1);
      if (d.weekly && d.weekly.length) renderBars(d.weekly.slice(-9));
    }).catch(function () {});

    loadTracked();
    loadSub();
  })();
  </script>
</body>
</html>
