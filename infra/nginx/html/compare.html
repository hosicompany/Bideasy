<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공고 비교 — BidEasy</title>
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>
    html,body{margin:0;}
    .cmp-tbl{border-collapse:collapse;width:100%;min-width:480px;}
    .cmp-tbl th,.cmp-tbl td{padding:14px 16px;text-align:left;border-bottom:1px solid var(--line);font-size:14px;vertical-align:top;}
    .cmp-tbl th{font-family:var(--font-mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:500;white-space:nowrap;width:120px;position:sticky;left:0;background:var(--surface);}
    .cmp-tbl td{border-left:1px solid var(--line);}
    .cmp-tbl tr:last-child th,.cmp-tbl tr:last-child td{border-bottom:none;}
  </style>
  <script src="/assets/app.js"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V4ERRL0NH0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-V4ERRL0NH0');
  </script>
</head>
<body class="bd" data-theme="light">
  <div id="nav"></div>
  <div style="max-width:1040px;margin:0 auto;padding:24px 28px 64px;">
    <a class="btn btn-quiet btn-sm" href="/search" style="margin-left:-8px;"><span id="back" style="display:flex;gap:6px;align-items:center;">공고 검색</span></a>
    <h1 style="font-size:28px;font-weight:800;letter-spacing:-0.7px;margin:12px 0 0;">공고 비교</h1>
    <p style="font-size:15px;color:var(--muted);margin-top:6px;">선택한 공고를 나란히 비교합니다. 자격은 로그인 시 회사 프로필 기준으로 표시돼요.</p>
    <div id="cmp" style="margin-top:22px;"></div>
  </div>

  <script>
  (function () {
    var BD = window.BD; BD.mountNav('search');
    var API_BASE = BD.API_BASE;
    document.getElementById('back').insertAdjacentHTML('afterbegin', '<span style="transform:rotate(180deg);display:flex;">' + BD.icon('chevR', 13) + '</span>');
    var TKO = { CONSTRUCTION: '공사', SERVICE: '용역', GOODS: '물품' };
    var token = BD.getToken();
    var host = document.getElementById('cmp');

    var bids = (new URLSearchParams(location.search).get('bids') || '').split(',').map(function (s) { return s.trim(); }).filter(Boolean).slice(0, 4);
    if (bids.length < 2) {
      host.innerHTML = '<div class="panel" style="padding:48px 24px;text-align:center;"><p style="font-size:15px;color:var(--muted);line-height:1.6;">비교할 공고가 부족해요.<br><a href="/search" style="color:var(--accent);font-weight:700;">공고 검색</a>에서 2건 이상 선택하세요.</p></div>';
      return;
    }

    host.innerHTML = '<div class="skel" style="height:260px;border-radius:16px;"></div>';
    Promise.all(bids.map(function (b) {
      var enc = encodeURIComponent(b); var out = { bid: b, ctx: null, qual: null };
      var ps = [fetch(API_BASE + '/bids/' + enc + '/context').then(function (r) { return r.ok ? r.json() : null; }).then(function (c) { out.ctx = c; }).catch(function () {})];
      if (token) ps.push(fetch(API_BASE + '/bids/' + enc + '/qualification', { headers: { Authorization: 'Bearer ' + token } }).then(function (r) { return r.ok ? r.json() : null; }).then(function (q) { out.qual = q; }).catch(function () {}));
      return Promise.all(ps).then(function () { return out; });
    })).then(render);

    function render(data) {
      var html = '<tr><th>공고</th>' + data.map(function (d) {
        var c = d.ctx || {};
        return '<td><span class="chip chip-neutral">' + (TKO[c.contract_type] || '공고') + '</span>' +
          '<a href="/bid.html?no=' + encodeURIComponent(d.bid) + '" style="display:block;margin-top:8px;font-weight:700;color:var(--ink);text-decoration:none;font-size:14.5px;line-height:1.4;">' + ((c.title || d.bid)) + '</a>' +
          '<div class="micro" style="font-size:9px;margin-top:4px;">' + d.bid + '</div></td>';
      }).join('') + '</tr>';
      function row(key, fn) { html += '<tr><th>' + key + '</th>' + data.map(function (d) { return '<td>' + fn(d.ctx || {}, d) + '</td>'; }).join('') + '</tr>'; }
      row('기초금액', function (c) { return c.estimated_price ? '<span class="num" style="font-weight:600;">' + BD.won(c.estimated_price) + '원</span>' : '—'; });
      row('계약 종류', function (c) { return TKO[c.contract_type] || '—'; });
      if (token) row('입찰 자격', function (c, d) {
        var q = d.qual; if (!q) return '—';
        if (q.status === 'PASS') return '<span class="chip chip-safe">' + BD.icon('check', 11, 2) + '가능</span>';
        if (q.status === 'FAIL') return '<span class="chip chip-danger">' + BD.icon('alert', 11, 2) + '미달</span>' + ((q.details && q.details[0]) ? '<div style="font-size:11.5px;color:var(--muted);margin-top:5px;line-height:1.4;">' + q.details[0] + '</div>' : '');
        return '—';
      });
      row('', function (c, d) { return '<a class="btn btn-primary btn-sm" href="/calculator.html?no=' + encodeURIComponent(d.bid) + '">투찰가 계산</a>'; });

      host.innerHTML = '<div class="card bd-scroll" style="overflow-x:auto;"><table class="cmp-tbl">' + html + '</table></div>' +
        (!token ? '<p style="font-size:13px;color:var(--faint);margin-top:12px;">로그인하면 회사 프로필 기준 <b style="color:var(--muted);">입찰 자격(가능/미달)</b>도 함께 비교됩니다. <a href="/login?redirect=' + encodeURIComponent(location.pathname + location.search) + '" style="color:var(--accent);">로그인</a></p>' : '');
    }
  })();
  </script>
</body>
</html>
