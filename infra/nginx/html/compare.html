<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공고 비교 - BidEasy</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/assets/nav.css">
  <script src="/assets/nav.js" defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif; background: #F2F4F6; color: #191F28; min-height: 100vh; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px 16px 64px; }
    .page-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .page-sub { font-size: 14px; color: #8B95A1; margin-bottom: 18px; }
    .back { color: #3182F6; text-decoration: none; font-size: 14px; }
    .tbl-wrap { overflow-x: auto; background:#fff; border-radius:16px; box-shadow:0 2px 8px rgba(0,0,0,.04); }
    table { border-collapse: collapse; width: 100%; min-width: 520px; }
    th, td { padding: 13px 16px; text-align: left; border-bottom: 1px solid #F2F4F6; font-size: 14px; vertical-align: top; }
    th.rowkey { background:#FAFBFC; color:#8B95A1; font-weight:600; font-size:13px; width:120px; white-space:nowrap; position:sticky; left:0; }
    td { border-left: 1px solid #F2F4F6; }
    .col-title a { font-weight:700; color:#191F28; text-decoration:none; font-size:14.5px; line-height:1.4; }
    .col-title a:hover { color:#3182F6; }
    .badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:6px; }
    .badge-cnstwk { background:#EBF2FF; color:#2563EB; } .badge-servc { background:#ECFDF3; color:#15803D; } .badge-thng { background:#FFF7ED; color:#C2410C; }
    .dday { font-size:12px; font-weight:700; padding:3px 9px; border-radius:6px; }
    .dday-soon { background:#FEF2F2; color:#DC2626; } .dday-ok { background:#F2F4F6; color:#4E5968; } .dday-closed { background:#F2F4F6; color:#B0B8C1; }
    .price { font-weight:700; }
    .qual-pass { color:#15803D; font-weight:700; } .qual-fail { color:#DC2626; font-weight:700; }
    .state { text-align:center; padding:48px; color:#8B95A1; }
    .loader { display:inline-block; width:18px; height:18px; border:2.5px solid #E5E8EB; border-top-color:#3182F6; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/search">← 공고 검색</a>
    <h1 class="page-title" style="margin-top:10px;">공고 비교</h1>
    <p class="page-sub">선택한 공고를 나란히 비교합니다. 자격은 로그인 시 회사 프로필 기준으로 표시됩니다.</p>
    <div id="state" class="state"><span class="loader"></span> 불러오는 중...</div>
    <div class="tbl-wrap" id="tbl-wrap" style="display:none;"><table id="tbl"></table></div>
  </div>

  <script>
    const API_BASE = 'https://api.bideasy.kr/api/v1';
    const $ = (id) => document.getElementById(id);
    function getToken(){ try { return localStorage.getItem('access_token') || localStorage.getItem('jwt') || null; } catch { return null; } }
    function fmtKRW(n){ n=Number(n)||0; if(!n) return '-'; if(n>=1e8) return (n/1e8).toFixed(n%1e8===0?0:1)+'억'; if(n>=1e4) return Math.round(n/1e4).toLocaleString('ko-KR')+'만'; return n.toLocaleString('ko-KR'); }
    function ddayInfo(e){ if(!e) return {txt:'-',cls:'dday-ok'}; const d=Math.ceil((new Date(String(e).replace(' ','T'))-new Date())/86400000); if(isNaN(d)) return {txt:'-',cls:'dday-ok'}; if(d<0) return {txt:'마감',cls:'dday-closed'}; if(d===0) return {txt:'D-day',cls:'dday-soon'}; return {txt:'D-'+d,cls:d<=3?'dday-soon':'dday-ok'}; }
    const CAT = { CONSTRUCTION:{label:'공사',cls:'badge-cnstwk'}, SERVICE:{label:'용역',cls:'badge-servc'}, GOODS:{label:'물품',cls:'badge-thng'} };

    async function load(){
      const bids = (new URLSearchParams(location.search).get('bids')||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,4);
      if(bids.length < 2){ $('state').innerHTML='비교할 공고가 부족해요. <a href="/search" style="color:#3182F6;">공고 검색</a>에서 2건 이상 선택하세요.'; return; }
      const token = getToken();
      const authH = token ? { Authorization: 'Bearer '+token } : {};
      // 컨텍스트 + (로그인 시) 자격 병렬 조회
      const data = await Promise.all(bids.map(async (b) => {
        const enc = encodeURIComponent(b);
        let ctx=null, qual=null;
        try { const r = await fetch(API_BASE+'/bids/'+enc+'/context'); if(r.ok) ctx = await r.json(); } catch {}
        if(token){ try { const q = await fetch(API_BASE+'/bids/'+enc+'/qualification',{headers:authH}); if(q.ok) qual = await q.json(); } catch {} }
        return { bid:b, ctx, qual };
      }));

      const rows = [];
      const titleRow = data.map(d => {
        const c=d.ctx||{}; const cat=CAT[c.contract_type]||{label:'기타',cls:'badge-cnstwk'};
        return '<td class="col-title"><span class="badge '+cat.cls+'">'+cat.label+'</span><br><a href="/bid/'+encodeURIComponent(d.bid)+'">'+((c.title||d.bid)).replace(/</g,'&lt;')+'</a></td>';
      }).join('');
      rows.push('<tr><th class="rowkey">공고</th>'+titleRow+'</tr>');

      function row(key, fn){ rows.push('<tr><th class="rowkey">'+key+'</th>'+data.map(d=>'<td>'+fn(d.ctx||{}, d)+'</td>').join('')+'</tr>'); }
      row('기초금액', c => '<span class="price">'+fmtKRW(c.estimated_price)+'원</span>');
      row('마감(개찰)', c => { const dd=ddayInfo(c.opening_date); return '<span class="dday '+dd.cls+'">'+dd.txt+'</span> '+(c.opening_date?String(c.opening_date).slice(0,16):'-'); });
      row('발주기관', c => (c.organization||'-'));
      row('지역', c => (c.region||'제한없음'));
      row('계약방법', c => (c.contract_method||'-'));
      if(token) row('입찰자격', (c,d) => { const q=d.qual; if(!q) return '-'; if(q.status==='PASS') return '<span class="qual-pass">✓ 가능</span>'; if(q.status==='FAIL') return '<span class="qual-fail">✗ 미달</span><br><span style="font-size:12px;color:#8B95A1;">'+((q.details||[])[0]||'')+'</span>'; return '-'; });

      $('tbl').innerHTML = rows.join('');
      $('state').style.display='none'; $('tbl-wrap').style.display='block';
    }
    load();
  </script>
</body>
</html>
