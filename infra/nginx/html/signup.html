<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입 — BidEasy</title>
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>html,body{margin:0;} .input-t{font-family:var(--font-sans)!important;font-variant-numeric:normal!important;}</style>
  <script src="/assets/app.js"></script>
</head>
<body class="bd" data-theme="light">
  <div class="bd-scroll" style="height:100vh;overflow-y:auto;overflow-x:hidden;">
    <div class="auth-grid" style="min-height:100%;">
      <div data-theme="dark" class="grid-bg auth-aside" style="background:var(--canvas);color:var(--ink);padding:48px 44px;display:flex;flex-direction:column;">
        <a href="/" style="display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;color:var(--ink);text-decoration:none;"><img src="/brand/bideasy-mark-on-dark.svg" width="22" height="22" alt="">BidEasy</a>
        <div style="margin-top:auto;">
          <h2 style="font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1.2;">1원 단위까지,<br>정확하게 <span style="color:var(--accent);">안전하게</span>.</h2>
          <p style="font-size:15px;color:var(--muted);line-height:1.65;margin-top:14px;max-width:320px;">나라장터 입찰을 지켜주는 정밀 계기. 사정률·하한선·AI 분석을 한 화면에서.</p>
        </div>
      </div>
      <div style="position:relative;padding:40px 28px;display:flex;flex-direction:column;justify-content:center;min-height:100vh;">
        <button id="themebtn2" class="btn btn-quiet btn-sm" style="position:absolute;top:20px;right:24px;padding:8px;" title="테마"></button>
        <div style="width:min(380px,100%);margin:0 auto;">
          <div style="display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;background:var(--accent-soft);margin-bottom:14px;"><span style="color:var(--accent);display:flex;" id="bolt"></span><span style="font-size:12px;font-weight:700;color:var(--accent);">신규 가입 시 Pro 14일 무료 · 카드 불필요</span></div>
          <h1 style="font-size:28px;font-weight:800;letter-spacing:-0.6px;margin:0;">회원가입</h1>
          <p style="font-size:14px;color:var(--muted);margin-top:6px;">30초면 끝나요. 오늘 보는 공고부터 함께.</p>
          <div style="margin-top:20px;">
            <div id="signup-err" style="display:none;background:var(--danger-soft);color:var(--danger);font-size:13.5px;font-weight:600;padding:11px 14px;border-radius:10px;margin-bottom:14px;"></div>
            <div><label class="field-label">이메일</label><input id="email" class="input input-t" type="email" autocomplete="email" placeholder="name@company.kr"></div>
            <div style="margin-top:16px;"><label class="field-label">비밀번호</label><input id="password" class="input input-t" type="password" autocomplete="new-password" placeholder="8자 이상"></div>
            <div style="margin-top:16px;"><label class="field-label">상호 (회사명)</label><input id="company" class="input input-t" autocomplete="organization" placeholder="예: 호시건설(주)"></div>
            <label id="agree" style="display:flex;align-items:flex-start;gap:9px;margin-top:16px;cursor:pointer;"><span id="cb" style="width:20px;height:20px;border-radius:6px;flex-shrink:0;margin-top:1px;display:grid;place-items:center;background:var(--surface);border:1px solid var(--line-2);"></span><span style="font-size:12.5px;color:var(--muted);line-height:1.5;"><b style="color:var(--ink-2);">이용약관</b> 및 <b style="color:var(--ink-2);">개인정보처리방침</b>에 동의합니다.</span></label>
            <button id="go" class="btn btn-primary btn-block" style="margin-top:18px;">14일 무료 체험 시작</button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;margin:22px 0;"><span style="flex:1;height:1px;background:var(--line);"></span><span style="font-size:12px;color:var(--faint);">또는</span><span style="flex:1;height:1px;background:var(--line);"></span></div>
          <div style="display:flex;flex-direction:column;gap:9px;">
            <button id="kakao" class="btn btn-block" style="background:#FEE500;color:#191600;border:none;"><span style="font-weight:800;font-size:14px;">kakao</span> 카카오로 계속하기</button>
            <button id="naver" class="btn btn-block" style="background:#03C75A;color:#fff;border:none;"><span style="font-weight:800;font-size:14px;">N</span> 네이버로 계속하기</button>
          </div>
          <p style="text-align:center;font-size:13.5px;color:var(--muted);margin-top:22px;">이미 계정이 있으신가요? <a href="/login" style="color:var(--accent);font-weight:700;">로그인</a></p>
        </div>
      </div>
    </div>
  </div>
  <script>
  (function () {
    var API_BASE = 'https://api.bideasy.kr/api/v1';
    var b = document.getElementById('themebtn2');
    function sync() { b.innerHTML = BD.icon(BD.getTheme() === 'dark' ? 'sun' : 'moon'); }
    sync(); b.addEventListener('click', function () { BD.setTheme(BD.getTheme() === 'dark' ? 'light' : 'dark'); sync(); });
    document.getElementById('bolt').innerHTML = BD.icon('bolt', 13);

    var agreed = false; var cb = document.getElementById('cb');
    document.getElementById('agree').addEventListener('click', function () {
      agreed = !agreed;
      cb.style.background = agreed ? 'var(--accent)' : 'var(--surface)';
      cb.style.borderColor = agreed ? 'var(--accent)' : 'var(--line-2)';
      cb.innerHTML = agreed ? '<span style="color:var(--on-accent);display:flex;">' + BD.icon('check', 12, 2.4) + '</span>' : '';
    });

    // 토큰 저장 + 익스텐션 핸드오프(postMessage) — 보존 필수
    function saveToken(t) {
      try { localStorage.setItem('access_token', t); } catch (e) {}
      try { localStorage.setItem('jwt', t); } catch (e) {}
      try { window.postMessage({ type: 'BIDEASY_TOKEN', token: t }, window.location.origin); } catch (e) {}
    }
    function redirectTarget() {
      var p = new URLSearchParams(location.search);
      return p.get('redirect') || p.get('next') || 'dashboard.html';
    }

    var emailEl = document.getElementById('email'), pwEl = document.getElementById('password'), coEl = document.getElementById('company');
    var go = document.getElementById('go'), errEl = document.getElementById('signup-err');
    function showErr(m) { errEl.textContent = m; errEl.style.display = 'block'; }
    function hideErr() { errEl.style.display = 'none'; }

    async function doSignup() {
      hideErr();
      var email = (emailEl.value || '').trim(), pw = pwEl.value || '', company = (coEl.value || '').trim();
      if (!email) { showErr('이메일을 입력해주세요'); return; }
      if (pw.length < 8) { showErr('비밀번호는 8자 이상이어야 해요'); return; }
      if (!agreed) { BD.toast('약관에 동의해 주세요', 'danger'); return; }
      go.disabled = true; var orig = go.textContent; go.textContent = '가입 처리 중...';
      try {
        // 1) 회원가입
        var reg = await fetch(API_BASE + '/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: pw, company_name: company || null, ceo_name: null }),
        });
        if (!reg.ok) {
          var t = await reg.text(); var msg = '회원가입에 실패했어요';
          try { var j = JSON.parse(t); if (j.detail) msg = j.detail; } catch (e) {}
          throw new Error(msg);
        }
        // 2) 자동 로그인 → 토큰
        var body = new URLSearchParams({ username: email, password: pw });
        var lg = await fetch(API_BASE + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() });
        if (!lg.ok) { BD.toast('가입 완료 · 로그인 페이지로 이동', 'accent'); setTimeout(function () { location.href = '/login'; }, 1200); return; }
        var data = await lg.json(); saveToken(data.access_token);
        BD.toast('가입 완료 · Pro 14일 무료 시작', 'accent');
        setTimeout(function () { location.href = redirectTarget(); }, 700);
      } catch (e) {
        showErr(e.message || '네트워크 오류'); go.disabled = false; go.textContent = orig;
      }
    }
    go.addEventListener('click', doSignup);

    async function social(provider) {
      try {
        var resp = await fetch(API_BASE + '/auth/social-urls');
        var data = await resp.json();
        var url = data[provider];
        if (!url) throw new Error('소셜 로그인 URL 없음');
        location.href = url;
      } catch (e) { showErr('소셜 로그인 시작 실패: ' + e.message); }
    }
    document.getElementById('kakao').addEventListener('click', function () { social('kakao'); });
    document.getElementById('naver').addEventListener('click', function () { social('naver'); });

    // OAuth 콜백 ?token= 처리 (소셜 가입 후 리다이렉트)
    (function () {
      var p = new URLSearchParams(location.search);
      var token = p.get('token');
      if (token) { saveToken(token); BD.toast('소셜 가입 성공'); history.replaceState(null, '', location.pathname); setTimeout(function () { location.href = redirectTarget(); }, 600); }
    })();
  })();
  </script>
</body>
</html>
