<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이용약관 — BidEasy</title>
  <meta name="description" content="BidEasy 서비스 이용약관.">
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>
    html,body{margin:0;}
    .doc h2{font-size:18px;font-weight:800;letter-spacing:-0.4px;margin:36px 0 12px;scroll-margin-top:80px;}
    .doc p,.doc li{font-size:14.5px;color:var(--ink-2);line-height:1.8;}
    .doc ul{margin:8px 0;padding-left:20px;}
    .doc li{margin:4px 0;}
    .toc a{display:block;font-size:13.5px;color:var(--muted);text-decoration:none;padding:5px 0;}
    .toc a:hover{color:var(--accent);}
  </style>
  <script src="/assets/app.js"></script>
</head>
<body class="bd" data-theme="light">
  <div id="nav"></div>

  <div style="max-width:760px;margin:0 auto;padding:40px 28px 72px;">
    <span class="eyebrow">Legal</span>
    <h1 style="font-size:30px;font-weight:800;letter-spacing:-0.8px;margin:10px 0 0;">이용약관</h1>
    <p style="font-size:13.5px;color:var(--faint);margin-top:8px;">최종 개정일 2026-06-09 · 시행일 2026-06-09</p>

    <div class="panel" style="padding:14px 16px;margin-top:18px;display:flex;gap:10px;align-items:flex-start;">
      <span style="color:var(--warn);flex-shrink:0;display:flex;margin-top:1px;" id="note-ic"></span>
      <p style="font-size:13px;color:var(--muted);line-height:1.6;margin:0;">본 약관은 디자인 적용을 위한 <b style="color:var(--ink-2);">예시 템플릿</b>입니다. 실제 시행 전 법무 검토를 받아 확정하세요.</p>
    </div>

    <div class="card toc" style="padding:16px 22px;margin-top:20px;">
      <div class="micro" style="margin-bottom:6px;">목차</div>
    </div>

    <div class="doc" id="doc"></div>
  </div>

  <script>
  (function () {
    var BD = window.BD; BD.mountNav();
    document.getElementById('note-ic').innerHTML = BD.icon('alert', 15, 2);

    var SECTIONS = [
      ['제1조 (목적)', '<p>본 약관은 호시(HOSI, 이하 "회사")가 제공하는 BidEasy 및 관련 제반 서비스(이하 "서비스")의 이용과 관련하여 회사와 회원 간의 권리·의무 및 책임사항, 이용 조건 및 절차를 규정함을 목적으로 합니다.</p>'],
      ['제2조 (정의)', '<ul><li>"서비스"란 공공입찰(나라장터/G2B) 공고의 검색·분석, 투찰가 계산, AI 요약, 자격 매칭, 마감 알림 등 회사가 크롬 익스텐션 및 웹(bideasy.kr)을 통해 제공하는 일체의 기능을 말합니다.</li><li>"회원"이란 본 약관에 동의하고 서비스 이용계약을 체결한 자를 말합니다.</li><li>"유료서비스"란 Pro·Pro+ 등 회원이 요금을 결제하고 이용하는 서비스를 말합니다.</li></ul>'],
      ['제3조 (약관의 효력 및 변경)', '<p>본 약관은 서비스 화면에 게시하거나 기타의 방법으로 회원에게 공지함으로써 효력이 발생합니다. 회사는 관련 법령을 위배하지 않는 범위에서 약관을 개정할 수 있으며, 개정 시 적용일자 및 사유를 명시하여 최소 7일 전(회원에게 불리한 변경은 30일 전)에 공지합니다.</p>'],
      ['제4조 (서비스의 제공)', '<p>회사는 다음의 서비스를 제공합니다.</p><ul><li>공고 검색·큐레이션 및 상세 정보 제공</li><li>투찰가·낙찰하한선·A값 계산</li><li>AI 기반 공고 요약 및 위험 조항 탐지</li><li>자격 자동 매칭 및 마감 알림</li></ul><p>회사는 <b>낙찰가 예측을 제공하지 않으며</b>, 서비스는 회원의 판단을 보조하는 참고 자료로 제공됩니다.</p>'],
      ['제5조 (이용계약의 성립)', '<p>이용계약은 회원이 되고자 하는 자가 약관에 동의하고 가입 신청을 한 후 회사가 이를 승낙함으로써 성립합니다. 신규 가입 회원에게는 카드 등록 없이 Pro 14일 무료 체험이 자동 제공될 수 있습니다.</p>'],
      ['제6조 (유료서비스 및 결제)', '<ul><li>유료서비스의 요금·결제 주기·기능은 요금제 페이지에 따릅니다.</li><li>정기결제는 회원이 등록한 결제수단으로 결제 주기마다 자동 청구됩니다.</li><li>회원은 다음 결제일 전까지 언제든 해지할 수 있으며, 해지 시 잔여 기간 종료 후 Free로 전환됩니다.</li></ul>'],
      ['제7조 (청약철회 및 환불)', '<p>회원은 관련 법령(전자상거래법 등)에 따라 청약철회를 할 수 있습니다. 디지털 콘텐츠의 특성상 이미 제공이 개시된 부분에 대해서는 환불이 제한될 수 있으며, 구체적 환불 기준은 별도 정책에 따릅니다.</p>'],
      ['제8조 (회원의 의무)', '<ul><li>회원은 타인의 정보를 도용하거나 허위 정보를 등록해서는 안 됩니다.</li><li>회원은 서비스를 통해 얻은 정보를 회사의 사전 동의 없이 복제·배포·상업적으로 이용해서는 안 됩니다.</li></ul>'],
      ['제9조 (면책 및 책임의 한계)', '<p>회사가 제공하는 계산 결과·요약·분석은 참고용이며, 실제 입찰 의사결정 및 그 결과에 대한 책임은 회원에게 있습니다. 회사는 공공데이터·외부 API의 오류, 천재지변, 회원의 귀책으로 인한 손해에 대해 책임을 지지 않습니다.</p>'],
      ['제10조 (분쟁의 해결)', '<p>본 약관은 대한민국 법령에 따라 해석되며, 서비스 이용과 관련한 분쟁에 대해서는 회사의 본사 소재지를 관할하는 법원을 합의관할로 합니다.</p>'],
    ];

    document.querySelector('.toc').insertAdjacentHTML('beforeend', SECTIONS.map(function (s, i) {
      return '<a href="#s' + i + '">' + s[0] + '</a>';
    }).join(''));
    document.getElementById('doc').innerHTML = SECTIONS.map(function (s, i) {
      return '<h2 id="s' + i + '">' + s[0] + '</h2>' + s[1];
    }).join('');
  })();
  </script>
</body>
</html>
