<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 — BidEasy</title>
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>html,body{margin:0;} .input-t{font-family:var(--font-sans)!important;font-variant-numeric:normal!important;}</style>
  <script src="/assets/app.js"></script>
</head>
<body class="bd" data-theme="light">
  <div class="bd-scroll" style="height:100vh;overflow-y:auto;overflow-x:hidden;">
    <div class="auth-grid" style="min-height:100%;">
      <div data-theme="dark" class="grid-bg auth-aside" style="background:var(--canvas);color:var(--ink);padding:48px 44px;display:flex;flex-direction:column;">
        <a href="/" style="display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px;color:var(--ink);text-decoration:none;"><img src="/brand/bideasy-mark-on-dark.svg" width="22" height="22" alt="">BidEasy</a>
        <div style="margin-top:auto;">
          <h2 style="font-size:30px;font-weight:800;letter-spacing:-1px;line-height:1.2;">1원 단위까지,<br>정확하게 <span style="color:var(--accent);">안전하게</span>.</h2>
          <p style="font-size:15px;color:var(--muted);line-height:1.65;margin-top:14px;max-width:320px;">나라장터 입찰을 지켜주는 정밀 계기. 사정률·하한선·AI 분석을 한 화면에서.</p>
        </div>
      </div>
      <div style="position:relative;padding:40px 28px;display:flex;flex-direction:column;justify-content:center;min-height:100vh;">
        <button id="themebtn2" class="btn btn-quiet btn-sm" style="position:absolute;top:20px;right:24px;padding:8px;" title="테마"></button>
        <div style="width:min(380px,100%);margin:0 auto;">
          <span class="eyebrow">Welcome back</span>
          <h1 style="font-size:28px;font-weight:800;letter-spacing:-0.6px;margin:8px 0 0;">로그인</h1>
          <p style="font-size:14px;color:var(--muted);margin-top:6px;">입찰 비서에 다시 오신 걸 환영해요.</p>
          <div style="margin-top:24px;">
            <div id="login-err" style="display:none;background:var(--danger-soft);color:var(--danger);font-size:13.5px;font-weight:600;padding:11px 14px;border-radius:10px;margin-bottom:14px;"></div>
            <div><label class="field-label">이메일</label><input id="email" class="input input-t" type="email" autocomplete="username" placeholder="name@company.kr"></div>
            <div style="margin-top:16px;"><label class="field-label">비밀번호</label><input id="password" class="input input-t" type="password" autocomplete="current-password" placeholder="••••••••"></div>
            <div style="text-align:right;margin-top:8px;"><a href="mailto:support@bideasy.kr" style="font-size:12.5px;color:var(--muted);cursor:pointer;">비밀번호를 잊으셨나요?</a></div>
            <button id="loginbtn" class="btn btn-primary btn-block" style="margin-top:18px;">로그인</button>
          </div>
          <div style="display:flex;align-items:center;gap:12px;margin:22px 0;"><span style="flex:1;height:1px;background:var(--line);"></span><span style="font-size:12px;color:var(--faint);">또는</span><span style="flex:1;height:1px;background:var(--line);"></span></div>
          <div style="display:flex;flex-direction:column;gap:9px;">
            <button id="kakao" class="btn btn-block" style="background:#FEE500;color:#191600;border:none;"><span style="font-weight:800;font-size:14px;">kakao</span> 카카오로 계속하기</button>
            <button id="naver" class="btn btn-block" style="background:#03C75A;color:#fff;border:none;"><span style="font-weight:800;font-size:14px;">N</span> 네이버로 계속하기</button>
          </div>
          <p style="text-align:center;font-size:13.5px;color:var(--muted);margin-top:22px;">아직 계정이 없으신가요? <a href="/signup" style="color:var(--accent);font-weight:700;">회원가입</a></p>
        </div>
      </div>
    </div>
  </div>
  <script>
  (function () {
    var API_BASE = 'https://api.bideasy.kr/api/v1';
    var b = document.getElementById('themebtn2');
    function sync() { b.innerHTML = BD.icon(BD.getTheme() === 'dark' ? 'sun' : 'moon'); }
    sync(); b.addEventListener('click', function () { BD.setTheme(BD.getTheme() === 'dark' ? 'light' : 'dark'); sync(); });

    // 토큰 저장 + 익스텐션 content script 로 핸드오프(postMessage) — 보존 필수
    function saveToken(t) {
      try { localStorage.setItem('access_token', t); } catch (e) {}
      try { localStorage.setItem('jwt', t); } catch (e) {}
      try { window.postMessage({ type: 'BIDEASY_TOKEN', token: t }, window.location.origin); } catch (e) {}
    }
    function redirectTarget() {
      var p = new URLSearchParams(location.search);
      var r = p.get('redirect') || p.get('next');
      return r || 'dashboard.html';
    }

    var emailEl = document.getElementById('email'), pwEl = document.getElementById('password');
    var btn = document.getElementById('loginbtn'), errEl = document.getElementById('login-err');
    function showErr(m) { errEl.textContent = m; errEl.style.display = 'block'; }
    function hideErr() { errEl.style.display = 'none'; }

    async function doLogin() {
      hideErr();
      var email = (emailEl.value || '').trim(), pw = pwEl.value || '';
      if (!email || !pw) { showErr('이메일과 비밀번호를 입력해주세요'); return; }
      btn.disabled = true; var orig = btn.textContent; btn.textContent = '로그인 중...';
      try {
        var body = new URLSearchParams({ username: email, password: pw });
        var resp = await fetch(API_BASE + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: body.toString() });
        if (!resp.ok) {
          var t = await resp.text(); var msg = '이메일 또는 비밀번호가 올바르지 않아요';
          try { var j = JSON.parse(t); if (j.detail) msg = j.detail; } catch (e) {}
          throw new Error(msg);
        }
        var data = await resp.json();
        saveToken(data.access_token);
        BD.toast('로그인됐어요');
        setTimeout(function () { location.href = redirectTarget(); }, 500);
      } catch (e) {
        showErr(e.message || '네트워크 오류'); btn.disabled = false; btn.textContent = orig;
      }
    }
    btn.addEventListener('click', doLogin);
    pwEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });
    emailEl.addEventListener('keydown', function (e) { if (e.key === 'Enter') doLogin(); });

    async function social(provider) {
      try {
        var resp = await fetch(API_BASE + '/auth/social-urls');
        var data = await resp.json();
        var url = data[provider];
        if (!url) throw new Error('소셜 로그인 URL 없음');
        location.href = url;
      } catch (e) { showErr('소셜 로그인 시작 실패: ' + e.message); }
    }
    document.getElementById('kakao').addEventListener('click', function () { social('kakao'); });
    document.getElementById('naver').addEventListener('click', function () { social('naver'); });

    // OAuth 콜백 처리 — 토큰은 #token= (fragment), 오류는 ?error= 로 전달
    (function () {
      var hp = new URLSearchParams((location.hash || '').replace(/^#/, ''));
      var token = hp.get('token');
      if (token) {
        saveToken(token);
        BD.toast('소셜 로그인 성공');
        history.replaceState(null, '', location.pathname);
        setTimeout(function () { location.href = redirectTarget(); }, 500);
        return;
      }
      var err = new URLSearchParams(location.search).get('error');
      if (err) { showErr('OAuth 오류: ' + err); history.replaceState(null, '', location.pathname); }
    })();
  })();
  </script>
</body>
</html>
