<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 — BidEasy</title>
  <link rel="icon" href="/brand/favicon.svg">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/theme.css">
  <style>html,body{margin:0;} .ed-input{width:100%;padding:8px 10px;font-size:14px;font-family:var(--font-sans);border:1px solid var(--line-2);border-radius:8px;background:var(--surface);color:var(--ink);}</style>
  <script src="/assets/app.js"></script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V4ERRL0NH0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-V4ERRL0NH0');
  </script>
</head>
<body class="bd" data-theme="light">
  <div id="nav"></div>
  <div style="max-width:760px;margin:0 auto;padding:32px 28px 64px;">
    <span class="eyebrow">My Page</span>
    <h1 style="font-size:30px;font-weight:800;letter-spacing:-0.8px;margin:8px 0 0;">마이페이지</h1>

    <!-- 구독 상태 -->
    <div class="card" id="sub-card" style="padding:24px;margin-top:22px;">
      <div style="font-size:14px;color:var(--muted);">구독 정보를 불러오는 중…</div>
    </div>

    <!-- 회사 정보 -->
    <div style="margin-top:28px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div><span class="micro">자격 매칭에 사용</span><h2 style="font-size:18px;font-weight:800;margin:6px 0 0;">회사 정보</h2></div>
        <button class="btn btn-ghost btn-sm" id="edit"><span style="display:flex;gap:6px;align-items:center;">수정</span></button>
      </div>
      <div class="card" id="profile" style="padding:6px 22px;margin-top:12px;"></div>
      <p style="font-size:12.5px;color:var(--faint);margin-top:10px;line-height:1.5;">이 정보로 모든 공고의 참여 가능 여부(적합/조건부/부적합)를 자동 판정해요.</p>
    </div>

    <!-- 알림 설정 -->
    <div style="margin-top:32px;">
      <h2 style="font-size:18px;font-weight:800;">알림 설정</h2>
      <div class="card" id="notif" style="padding:8px 22px;margin-top:12px;"></div>
    </div>

    <!-- 계정 -->
    <div style="margin-top:32px;">
      <h2 style="font-size:18px;font-weight:800;">계정</h2>
      <div class="card" id="account" style="padding:6px 22px;margin-top:12px;"></div>
      <div style="display:flex;gap:10px;margin-top:14px;"><button class="btn btn-ghost btn-sm" id="pwbtn">비밀번호 변경</button><button class="btn btn-quiet btn-sm" id="logoutbtn" style="color:var(--danger);">로그아웃</button></div>
    </div>
  </div>

  <script>
  (function () {
    var BD = window.BD; BD.mountNav('account');
    var API_BASE = BD.API_BASE;

    function getToken() { return BD.getToken(); }
    function clearToken() { try { localStorage.removeItem('access_token'); localStorage.removeItem('jwt'); } catch (e) {} }
    if (!getToken()) { location.href = '/login?redirect=' + encodeURIComponent('/account'); return; }

    async function api(path, init) {
      init = init || {};
      var token = getToken();
      if (!token) throw new Error('NO_TOKEN');
      var headers = new Headers(init.headers || {});
      headers.set('Authorization', 'Bearer ' + token);
      if (init.body && !headers.has('Content-Type')) headers.set('Content-Type', 'application/json');
      var resp = await fetch(API_BASE + path, Object.assign({}, init, { headers: headers }));
      if (resp.status === 401) { clearToken(); location.href = '/login'; throw new Error('UNAUTHORIZED'); }
      if (!resp.ok) { var t = await resp.text(); var msg = 'HTTP ' + resp.status; try { var j = JSON.parse(t); if (j.detail) msg = j.detail; } catch (e) {} throw new Error(msg); }
      return resp.json();
    }
    function fmtDate(s) { if (!s) return '—'; var d = new Date(s); if (isNaN(d)) return '—'; return d.getFullYear() + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + String(d.getDate()).padStart(2, '0'); }
    function won(n) { return (Number(n) || 0).toLocaleString('ko-KR'); }
    var TIER_NAMES = { free: 'Free', pro: 'Pro', pro_plus: 'Pro+' };

    // ── 구독 상태 ──────────────────────────────────────────
    async function loadSubscription() {
      var card = document.getElementById('sub-card');
      var sub, billing = null;
      try { sub = await api('/payments/subscription'); } catch (e) { card.innerHTML = '<div style="font-size:14px;color:var(--danger);">구독 정보를 불러오지 못했어요.</div>'; return null; }
      try { billing = await api('/payments/billing'); } catch (e) { billing = null; }

      var tier = sub.tier || 'free';
      var winbackDays = (sub.winback_eligible && sub.winback_expires_at) ? Math.max(0, Math.ceil((new Date(sub.winback_expires_at) - new Date()) / 86400000)) : 0;
      var winbackBanner = sub.winback_eligible
        ? '<div style="background:var(--warn-soft);color:var(--warn);padding:11px 14px;border-radius:10px;font-size:13px;font-weight:700;margin-top:14px;display:flex;gap:8px;align-items:center;"><span style="display:flex;">' + BD.icon('bolt', 14) + '</span>첫 달 ' + sub.winback_discount_pct + '% 할인 자격 — ' + winbackDays + '일 안에 월간 결제 시 자동 적용</div>'
        : '';
      var winbackPrice = sub.winback_eligible ? Math.round(24900 * (1 - sub.winback_discount_pct / 100)) : 24900;

      function head(title, chipHtml, desc, ctaHtml) {
        return '<div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">' +
          '<span style="width:48px;height:48px;border-radius:13px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;flex-shrink:0;">' + BD.icon('bolt', 22) + '</span>' +
          '<div style="flex:1;min-width:160px;"><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;"><span style="font-size:18px;font-weight:800;">' + title + '</span>' + (chipHtml || '') + '</div>' +
          '<div style="font-size:13.5px;color:var(--muted);margin-top:3px;">' + desc + '</div></div>' +
          (ctaHtml || '') + '</div>';
      }

      if (sub.is_trial) {
        var d = (sub.trial_days_remaining != null) ? sub.trial_days_remaining : 0;
        var cta = sub.winback_eligible ? '지금 결제 (월 ' + won(winbackPrice) + '원)' : 'Pro 계속 쓰기';
        card.innerHTML = head('Pro 체험 중',
          '<span class="chip chip-accent" style="font-family:var(--font-mono);">D-' + d + '</span>',
          fmtDate(sub.trial_expires_at) + ' 종료 · 종료 시 자동으로 Free 전환 (카드 등록 없음)',
          '<a class="btn btn-primary btn-sm" style="margin-left:auto;" href="/pricing">' + cta + '</a>') + winbackBanner;
      } else if (sub.is_active && tier !== 'free') {
        var autoRenew = billing && billing.auto_renew;
        var cycle = ((billing && billing.billing_cycle === 'annual') || sub.billing_cycle === 'annual') ? '연간' : '월간';
        var rows = '<div class="drow"><span class="k">현재 플랜</span><span class="v" style="font-family:var(--font-sans);font-weight:700;">' + (TIER_NAMES[tier] || tier) + ' · ' + cycle + '</span></div>' +
          '<div class="drow"><span class="k">' + (autoRenew ? '다음 결제일' : '만료일') + '</span><span class="v">' + fmtDate(sub.expires_at) + '</span></div>' +
          (billing && billing.card ? '<div class="drow"><span class="k">결제 카드</span><span class="v" style="font-family:var(--font-sans);">' + billing.card + '</span></div>' : '') +
          '<div class="drow"><span class="k">자동 갱신</span><span class="v" style="font-family:var(--font-sans);font-weight:700;color:' + (autoRenew ? 'var(--safe)' : 'var(--faint)') + ';">' + (autoRenew ? 'ON' : '해지됨') + '</span></div>';
        var actions = autoRenew
          ? '<a class="btn btn-ghost btn-sm" href="/pricing">플랜 변경</a><button class="btn btn-quiet btn-sm" id="btn-cancel" style="color:var(--danger);">자동 갱신 해지</button>'
          : '<a class="btn btn-primary btn-sm" href="/pricing">자동 갱신 다시 켜기</a>';
        card.innerHTML = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px;"><span style="width:40px;height:40px;border-radius:11px;background:var(--accent-soft);color:var(--accent);display:grid;place-items:center;">' + BD.icon('shield', 19) + '</span><div style="font-size:18px;font-weight:800;">' + (TIER_NAMES[tier] || tier) + ' 구독 중</div></div>' + rows + '<div style="display:flex;gap:10px;margin-top:16px;">' + actions + '</div>';
        var cb = document.getElementById('btn-cancel'); if (cb) cb.addEventListener('click', cancelSubscription);
      } else {
        var msg = sub.winback_eligible
          ? '체험이 끝났어요. ' + winbackDays + '일 안에 결제하면 첫 달 ' + sub.winback_discount_pct + '% 할인이 적용됩니다.'
          : (sub.has_used_trial ? '체험이 끝났어요. Pro로 업그레이드하고 모든 기능을 계속 사용하세요.' : '현재 Free 플랜을 사용 중이에요.');
        var ctaF = sub.winback_eligible ? '지금 결제 (월 ' + won(winbackPrice) + '원)' : 'Pro 구독하기';
        card.innerHTML = head('Free 플랜', '', msg,
          '<a class="btn btn-primary btn-sm" style="margin-left:auto;" href="/pricing">' + ctaF + '</a>') + winbackBanner;
      }
      return billing;
    }

    async function cancelSubscription() {
      if (!confirm('자동 갱신을 해지할까요? 남은 기간은 그대로 사용할 수 있어요.')) return;
      try { await api('/payments/subscribe/cancel', { method: 'POST' }); BD.toast('자동 갱신을 해지했어요'); loadSubscription(); }
      catch (e) { BD.toast(e.message || '해지 실패', 'danger'); }
    }

    // ── 회사 정보 (profile) ────────────────────────────────
    var PROFILE_FIELDS = [
      ['company_name', '상호', 'text'],
      ['licenses', '보유 면허', 'text'],
      ['location', '본사 지역', 'text'],
      ['capacity_cost', '시공능력평가액(원)', 'number'],
      ['performance_record', '최근 3년 최대 실적(원)', 'number'],
    ];
    var currentUser = {};
    var editing = false;
    function renderProfileView() {
      var el = document.getElementById('profile');
      el.innerHTML = PROFILE_FIELDS.map(function (f) {
        var v = currentUser[f[0]];
        var disp = (v === null || v === undefined || v === '') ? '<span style="color:var(--faint);">미입력</span>'
          : (f[2] === 'number' ? won(v) + '원' : v);
        return '<div class="drow"><span class="k">' + f[1] + '</span><span class="v" style="font-family:var(--font-sans);font-weight:600;">' + disp + '</span></div>';
      }).join('');
    }
    function renderProfileEdit() {
      var el = document.getElementById('profile');
      el.innerHTML = PROFILE_FIELDS.map(function (f) {
        var v = currentUser[f[0]]; if (v === null || v === undefined) v = '';
        return '<div class="drow" style="align-items:center;"><span class="k">' + f[1] + '</span><span style="flex:1;max-width:300px;margin-left:16px;"><input class="ed-input" id="pf-' + f[0] + '" type="' + (f[2] === 'number' ? 'number' : 'text') + '" value="' + String(v).replace(/"/g, '&quot;') + '"></span></div>';
      }).join('');
    }
    async function saveProfile() {
      var payload = {};
      PROFILE_FIELDS.forEach(function (f) {
        var inp = document.getElementById('pf-' + f[0]); if (!inp) return;
        var val = inp.value;
        payload[f[0]] = (f[2] === 'number') ? (val === '' ? 0 : Number(val)) : val;
      });
      try {
        var updated = await api('/users/me', { method: 'PUT', body: JSON.stringify(payload) });
        currentUser = Object.assign(currentUser, updated || payload);
        editing = false; document.getElementById('edit').querySelector('span').lastChild.textContent = '수정';
        renderProfileView(); BD.toast('회사 정보를 저장했어요');
      } catch (e) { BD.toast(e.message || '저장 실패', 'danger'); }
    }
    document.getElementById('edit').addEventListener('click', function () {
      if (!editing) { editing = true; renderProfileEdit(); this.querySelector('span').lastChild.textContent = '저장'; }
      else { saveProfile(); }
    });

    // ── 계정 ───────────────────────────────────────────────
    function renderAccount(user, billing) {
      var social = user.social_provider ? (user.social_provider === 'kakao' ? '카카오' : (user.social_provider === 'naver' ? '네이버' : user.social_provider)) : '이메일';
      var card = (billing && billing.card) ? billing.card : '등록된 카드 없음';
      document.getElementById('account').innerHTML = [
        ['이메일', user.email || '—'], ['결제 수단', card], ['로그인 방식', social],
      ].map(function (r) { return '<div class="drow"><span class="k">' + r[0] + '</span><span class="v" style="font-family:var(--font-sans);font-weight:600;">' + r[1] + '</span></div>'; }).join('');
    }

    // ── 알림 설정 (로컬 — 표시용) ───────────────────────────
    var NOTIF = [['deadline', '마감 임박 알림', '관심 공고 마감 1시간·15분 전 푸시', true], ['newfit', '새 적합 공고 알림', '자격에 맞는 공고가 올라오면 알림', true], ['opening', '개찰 결과 알림', '참여 공고의 개찰 결과 통보', false], ['marketing', '혜택·소식 알림', '할인·신기능 소식 받기', false]];
    var nstate = {}; NOTIF.forEach(function (n) { nstate[n[0]] = n[3]; });
    function renderNotif() {
      document.getElementById('notif').innerHTML = NOTIF.map(function (n, i) {
        var on = nstate[n[0]];
        return '<div style="display:flex;align-items:center;gap:16px;padding:15px 0;' + (i ? 'border-top:1px solid var(--line);' : '') + '"><div style="flex:1;"><div style="font-size:14.5px;font-weight:600;">' + n[1] + '</div><div style="font-size:12.5px;color:var(--muted);margin-top:2px;">' + n[2] + '</div></div>' +
          '<button class="tg" data-k="' + n[0] + '" style="width:44px;height:26px;border-radius:13px;border:none;cursor:pointer;padding:3px;background:var(--' + (on ? 'accent' : 'line-2') + ');display:flex;transition:background .16s;"><span style="width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:var(--shadow-sm);transform:' + (on ? 'translateX(18px)' : 'none') + ';transition:transform .16s;"></span></button></div>';
      }).join('');
      document.querySelectorAll('.tg').forEach(function (b) { b.addEventListener('click', function () { nstate[b.getAttribute('data-k')] = !nstate[b.getAttribute('data-k')]; renderNotif(); }); });
    }

    // 버튼들
    document.getElementById('logoutbtn').addEventListener('click', function () { if (confirm('로그아웃하시겠어요?')) { clearToken(); location.href = '/'; } });
    document.getElementById('pwbtn').addEventListener('click', openPwModal);
    function openPwModal() {
      var ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;z-index:500;background:rgba(17,21,28,.45);display:flex;align-items:center;justify-content:center;padding:20px;';
      ov.innerHTML = '<div class="card" style="width:min(380px,100%);padding:24px;">' +
        '<div style="font-size:18px;font-weight:800;">비밀번호 변경</div>' +
        '<div id="pw-err" style="display:none;background:var(--danger-soft);color:var(--danger);font-size:13px;font-weight:600;padding:10px 13px;border-radius:9px;margin-top:14px;"></div>' +
        '<div style="margin-top:16px;"><label class="field-label">현재 비밀번호</label><input id="pw-cur" class="input" type="password" style="font-family:var(--font-sans);"></div>' +
        '<div style="margin-top:14px;"><label class="field-label">새 비밀번호 (8자 이상)</label><input id="pw-new" class="input" type="password" style="font-family:var(--font-sans);"></div>' +
        '<div style="margin-top:14px;"><label class="field-label">새 비밀번호 확인</label><input id="pw-new2" class="input" type="password" style="font-family:var(--font-sans);"></div>' +
        '<div style="display:flex;gap:10px;margin-top:20px;"><button id="pw-cancel" class="btn btn-ghost btn-block">취소</button><button id="pw-save" class="btn btn-primary btn-block">변경</button></div></div>';
      document.body.appendChild(ov);
      function close() { if (ov.parentNode) document.body.removeChild(ov); }
      ov.addEventListener('click', function (e) { if (e.target === ov) close(); });
      document.getElementById('pw-cancel').addEventListener('click', close);
      var errEl = document.getElementById('pw-err');
      function showErr(m) { errEl.textContent = m; errEl.style.display = 'block'; }
      var saveBtn = document.getElementById('pw-save');
      saveBtn.addEventListener('click', async function () {
        errEl.style.display = 'none';
        var cur = document.getElementById('pw-cur').value, nw = document.getElementById('pw-new').value, nw2 = document.getElementById('pw-new2').value;
        if (!cur || !nw) { showErr('현재·새 비밀번호를 입력해주세요'); return; }
        if (nw.length < 8) { showErr('새 비밀번호는 8자 이상이어야 해요'); return; }
        if (nw !== nw2) { showErr('새 비밀번호가 일치하지 않아요'); return; }
        saveBtn.disabled = true; saveBtn.textContent = '변경 중...';
        try {
          await api('/users/me/password', { method: 'PUT', body: JSON.stringify({ current_password: cur, new_password: nw }) });
          close(); BD.toast('비밀번호가 변경되었어요');
        } catch (e) { showErr(e.message || '변경에 실패했어요'); saveBtn.disabled = false; saveBtn.textContent = '변경'; }
      });
    }

    // init
    document.getElementById('edit').querySelector('span').insertAdjacentHTML('afterbegin', BD.icon('doc', 13));
    renderNotif();
    (async function () {
      var user = {};
      try { user = await api('/users/me'); } catch (e) {}
      currentUser = user || {};
      renderProfileView();
      var billing = await loadSubscription();
      renderAccount(currentUser, billing);
    })();
  })();
  </script>
</body>
</html>
