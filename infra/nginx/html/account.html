<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - BidEasy</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F2F4F6;
      color: #191F28;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 720px; margin: 0 auto; }
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 800;
    }
    .page-header a {
      color: #3182F6;
      text-decoration: none;
      font-size: 14px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .card h3 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 14px;
      color: #191F28;
    }
    .card-sub { font-size: 13px; color: #8B95A1; margin-top: -10px; margin-bottom: 14px; }

    /* 사용자 카드 */
    .user-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #EBF5FF;
      color: #3182F6;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
    }
    .user-info { flex: 1; }
    .user-email { font-size: 15px; font-weight: 600; }
    .user-company { font-size: 13px; color: #8B95A1; margin-top: 2px; }
    .tier-chip {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
    }
    .tier-free { background: #F2F4F6; color: #4E5968; }
    .tier-pro { background: #EBF5FF; color: #1B64DA; }
    .tier-pro_plus { background: #FFF6E5; color: #C77700; }

    /* 구독 카드 */
    .sub-status {
      padding: 16px;
      border-radius: 12px;
      background: #F8F9FA;
      margin-bottom: 14px;
    }
    .sub-status.trial { background: #EBF5FF; }
    .sub-status.active { background: #E8F5E9; }
    .sub-status.free { background: #F8F9FA; }
    .sub-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
    }
    .sub-row .label { color: #4E5968; }
    .sub-row .value { font-weight: 600; color: #191F28; }
    .btn-row { display: flex; gap: 10px; margin-top: 14px; }
    .btn {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-primary { background: #3182F6; color: #fff; }
    .btn-primary:hover { background: #1B64DA; }
    .btn-outline {
      background: #fff;
      color: #4E5968;
      border: 1px solid #E5E8EB;
    }
    .btn-outline:hover { background: #F8F9FA; }
    .btn-danger {
      background: #fff;
      color: #E53935;
      border: 1px solid #FFCDD2;
    }
    .btn-danger:hover { background: #FFF0F0; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 결제 내역 테이블 */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 12px 8px;
      text-align: left;
      border-bottom: 1px solid #F2F4F6;
    }
    th {
      font-size: 12px;
      color: #8B95A1;
      font-weight: 600;
      text-transform: uppercase;
    }
    td.amount { font-weight: 700; color: #191F28; }
    td.kind {
      font-size: 12px;
      color: #4E5968;
    }
    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #8B95A1;
      font-size: 14px;
    }

    /* 알림·로딩 */
    .alert {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #fff;
      padding: 12px 16px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      font-size: 14px;
      max-width: 320px;
      z-index: 9999;
      display: none;
    }
    .alert.show { display: block; }
    .alert.error { border-left: 4px solid #E53935; color: #C62828; }
    .alert.success { border-left: 4px solid #22A06B; color: #1B5E20; }

    .skel {
      background: linear-gradient(90deg, #F2F4F6 0%, #E5E8EB 50%, #F2F4F6 100%);
      background-size: 200% 100%;
      animation: skel 1.2s ease-in-out infinite;
      border-radius: 8px;
      height: 16px;
    }
    @keyframes skel {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* 비로그인 안내 */
    .login-required {
      text-align: center;
      padding: 60px 20px;
    }
    .login-required h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .login-required p { color: #4E5968; margin-bottom: 18px; }

    .footer {
      text-align: center;
      padding: 24px 0;
      color: #8B95A1;
      font-size: 13px;
    }
    .footer a {
      color: #3182F6;
      text-decoration: none;
      margin: 0 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>마이페이지</h1>
      <a href="/">← 홈으로</a>
    </div>

    <div id="not-logged-in" class="card login-required" style="display:none;">
      <h2>로그인이 필요해요</h2>
      <p>마이페이지를 보려면 먼저 로그인해주세요.</p>
      <div style="display:flex;gap:10px;justify-content:center;">
        <a class="btn btn-primary" href="/login">로그인</a>
        <a class="btn btn-outline" href="/signup">14일 체험 시작</a>
      </div>
    </div>

    <div id="logged-in" style="display:none;">
      <!-- 사용자 정보 -->
      <div class="card">
        <h3>내 계정</h3>
        <div class="user-row">
          <div class="avatar" id="avatar">?</div>
          <div class="user-info">
            <div class="user-email" id="user-email">—</div>
            <div class="user-company" id="user-company">—</div>
          </div>
          <span class="tier-chip" id="tier-chip">Free</span>
        </div>
      </div>

      <!-- 구독·체험 상태 -->
      <div class="card">
        <h3>구독 상태</h3>
        <div id="sub-status-box" class="sub-status free">
          <div class="skel" style="margin-bottom:8px;"></div>
          <div class="skel" style="width:60%;"></div>
        </div>
        <div class="btn-row" id="sub-actions" style="display:none;"></div>
      </div>

      <!-- 결제 내역 -->
      <div class="card">
        <h3>결제 내역</h3>
        <p class="card-sub">최근 50건의 결제 기록</p>
        <div id="history-content">
          <div class="skel" style="margin-bottom:8px;"></div>
          <div class="skel" style="margin-bottom:8px;"></div>
          <div class="skel"></div>
        </div>
      </div>

      <!-- 위험 영역 -->
      <div class="card">
        <h3>계정 관리</h3>
        <div class="btn-row">
          <button class="btn btn-outline" id="btn-logout">로그아웃</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <a href="/">홈</a> ·
      <a href="/pricing">요금제</a> ·
      <a href="/terms">이용약관</a> ·
      <a href="/privacy">개인정보처리방침</a>
    </div>
  </div>

  <div id="alert" class="alert"></div>

  <script>
    const API_BASE = 'https://api.bideasy.kr/api/v1';

    const TIER_NAMES = { free: 'Free', pro: 'Pro', pro_plus: 'Pro+' };
    const TIER_CLASSES = { free: 'tier-free', pro: 'tier-pro', pro_plus: 'tier-pro_plus' };

    function getToken() {
      try {
        return localStorage.getItem('access_token') || localStorage.getItem('jwt') || null;
      } catch { return null; }
    }

    function clearToken() {
      try {
        localStorage.removeItem('access_token');
        localStorage.removeItem('jwt');
      } catch {}
    }

    function showAlert(msg, type = 'success') {
      const box = document.getElementById('alert');
      box.textContent = msg;
      box.className = 'alert show ' + type;
      setTimeout(() => box.classList.remove('show'), 3500);
    }

    function fmtKRW(n) { return n != null ? n.toLocaleString('ko-KR') + '원' : '—'; }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}.${m}.${day}`;
    }

    async function api(path, init = {}) {
      const token = getToken();
      if (!token) throw new Error('NO_TOKEN');
      const headers = new Headers(init.headers);
      headers.set('Authorization', 'Bearer ' + token);
      if (init.body && !headers.has('Content-Type')) {
        headers.set('Content-Type', 'application/json');
      }
      const resp = await fetch(API_BASE + path, { ...init, headers });
      if (resp.status === 401) {
        clearToken();
        throw new Error('UNAUTHORIZED');
      }
      if (!resp.ok) {
        const txt = await resp.text();
        let msg = `HTTP ${resp.status}`;
        try { const j = JSON.parse(txt); if (j.detail) msg = j.detail; } catch {}
        throw new Error(msg);
      }
      return resp.json();
    }

    async function loadUser() {
      const user = await api('/users/me');
      const email = user.email || '—';
      document.getElementById('user-email').textContent = email;
      document.getElementById('user-company').textContent =
        user.company_name || user.ceo_name || '회사 정보 미입력';
      document.getElementById('avatar').textContent = (email[0] || '?').toUpperCase();
      return user;
    }

    async function loadSubscription() {
      const sub = await api('/payments/subscription');

      // tier chip
      const tier = sub.tier || 'free';
      const chip = document.getElementById('tier-chip');
      chip.textContent = sub.is_trial ? 'Trial' : TIER_NAMES[tier];
      chip.className = 'tier-chip ' + (TIER_CLASSES[tier] || 'tier-free');

      // 상태 박스
      const box = document.getElementById('sub-status-box');
      const actions = document.getElementById('sub-actions');
      box.innerHTML = '';
      actions.innerHTML = '';
      actions.style.display = 'flex';

      // Win-back 자격 안내 (Trial 활성·Free 모두 적용 가능)
      const winbackDays = sub.winback_eligible && sub.winback_expires_at
        ? Math.max(0, Math.ceil((new Date(sub.winback_expires_at) - new Date()) / 86400000))
        : 0;
      const winbackBanner = sub.winback_eligible
        ? `<div style="background:#FEE500;color:#191F28;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-top:10px;">
             🎁 첫 달 ${sub.winback_discount_pct}% 할인 자격 — ${winbackDays}일 안에 월간 결제 시 자동 적용
           </div>` : '';

      if (sub.is_trial) {
        box.className = 'sub-status trial';
        box.innerHTML = `
          <div class="sub-row"><span class="label">현재 플랜</span><span class="value">🎁 Pro 14일 체험</span></div>
          <div class="sub-row"><span class="label">잔여 기간</span><span class="value">${sub.trial_days_remaining}일</span></div>
          <div class="sub-row"><span class="label">만료일</span><span class="value">${fmtDate(sub.trial_expires_at)}</span></div>
          ${winbackBanner}
        `;
        const ctaText = sub.winback_eligible
          ? `지금 결제 (월 ${(14900 * (1 - sub.winback_discount_pct/100)).toLocaleString('ko-KR')}원) →`
          : '지금 결제하고 무중단 사용 →';
        actions.innerHTML = `<a class="btn btn-primary" href="/pricing">${ctaText}</a>`;
      } else if (sub.is_active && tier !== 'free') {
        box.className = 'sub-status active';
        box.innerHTML = `
          <div class="sub-row"><span class="label">현재 플랜</span><span class="value">${TIER_NAMES[tier]} (${sub.billing_cycle === 'annual' ? '연간' : '월간'})</span></div>
          <div class="sub-row"><span class="label">만료일</span><span class="value">${fmtDate(sub.expires_at)}</span></div>
        `;
        actions.innerHTML = `
          <a class="btn btn-outline" href="/pricing">플랜 변경</a>
          <button class="btn btn-danger" id="btn-cancel">구독 해지</button>
        `;
        document.getElementById('btn-cancel').addEventListener('click', cancelSubscription);
      } else {
        // Free (체험 없음 또는 만료)
        box.className = 'sub-status free';
        const msg = sub.winback_eligible
          ? `체험이 끝났어요. <strong>${winbackDays}일 안에 결제하면 첫 달 ${sub.winback_discount_pct}% 할인</strong>이 적용됩니다.`
          : sub.has_used_trial
            ? '체험이 끝났어요. Pro 로 업그레이드하고 모든 기능을 계속 사용하세요.'
            : '현재 Free 플랜을 사용 중이에요.';
        box.innerHTML = `
          <div class="sub-row"><span class="label">현재 플랜</span><span class="value">Free</span></div>
          <div style="font-size:13px;color:#4E5968;margin-top:6px;">${msg}</div>
          ${winbackBanner}
        `;
        const ctaText = sub.winback_eligible
          ? `지금 결제 (월 ${(14900 * (1 - sub.winback_discount_pct/100)).toLocaleString('ko-KR')}원) →`
          : 'Pro 구독하기';
        actions.innerHTML = `<a class="btn btn-primary" href="/pricing">${ctaText}</a>`;
      }
    }

    async function loadHistory() {
      const data = await api('/payments/history?limit=50');
      const container = document.getElementById('history-content');

      if (!data.items || data.items.length === 0) {
        container.innerHTML = `<div class="empty-state">결제 내역이 없어요</div>`;
        return;
      }

      const rows = data.items.map((item) => {
        const kindLabel = item.order_kind === 'subscription' ? '구독' : '포인트';
        return `
          <tr>
            <td>${fmtDate(item.confirmed_at || item.created_at)}</td>
            <td class="kind">${kindLabel}</td>
            <td class="amount">${fmtKRW(item.amount)}</td>
            <td style="color:#8B95A1;font-size:12px;">${item.method || '—'}</td>
          </tr>
        `;
      }).join('');

      container.innerHTML = `
        <table>
          <thead>
            <tr><th>날짜</th><th>구분</th><th>금액</th><th>수단</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    async function cancelSubscription() {
      if (!confirm('정말로 구독을 해지하시겠어요?\n만료일까지는 계속 사용하실 수 있어요.')) return;
      try {
        const resp = await api('/payments/subscribe/cancel', { method: 'POST' });
        showAlert(resp.message || '구독이 해지되었습니다', 'success');
        setTimeout(() => loadSubscription(), 800);
      } catch (err) {
        showAlert(err.message || '해지 중 오류가 발생했어요', 'error');
      }
    }

    document.getElementById('btn-logout').addEventListener('click', () => {
      if (!confirm('로그아웃하시겠어요?')) return;
      clearToken();
      window.location.href = '/';
    });

    // 초기화
    (async function init() {
      const token = getToken();
      if (!token) {
        document.getElementById('not-logged-in').style.display = 'block';
        return;
      }
      document.getElementById('logged-in').style.display = 'block';

      try {
        await Promise.all([loadUser(), loadSubscription(), loadHistory()]);
      } catch (err) {
        if (err.message === 'UNAUTHORIZED' || err.message === 'NO_TOKEN') {
          document.getElementById('logged-in').style.display = 'none';
          document.getElementById('not-logged-in').style.display = 'block';
        } else {
          showAlert(err.message || '정보를 불러오지 못했어요', 'error');
        }
      }
    })();
  </script>
</body>
</html>
