name: bideasy_app
description: "BidEasy - 공공입찰 안전 비서. 데이터 기반 투찰가 분석과 AI 공고 분석."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  intl: ^0.19.0
  http: ^1.1.2
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.4
  sentry_flutter: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.3.3
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  
  assets:
    - assets/fonts/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
