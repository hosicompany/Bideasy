<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BidEasy - 공공입찰 안전 비서. 데이터 기반 투찰가 분석과 AI 공고 분석 서비스.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BidEasy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>BidEasy</title>
  <link rel="manifest" href="manifest.json">

  <!-- Toss Payments JS SDK v2 -->
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <script>
    function requestTossPaymentJS(clientKey, orderId, amount, orderName, customerName, successUrl, failUrl) {
      var toss = TossPayments(clientKey);
      var payment = toss.payment({ customerKey: "ANONYMOUS" });
      payment.requestPayment({
        method: "CARD",
        amount: { currency: "KRW", value: amount },
        orderId: orderId,
        orderName: orderName,
        customerName: customerName,
        successUrl: successUrl,
        failUrl: failUrl,
      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
