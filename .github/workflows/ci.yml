name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install ruff
      - run: ruff check backend/

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bideasy
          POSTGRES_PASSWORD: bideasy_pass
          POSTGRES_DB: bideasy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bideasy -d bideasy_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r backend/requirements.txt
      - run: |
          cd backend
          pytest tests/ -v
        env:
          DATABASE_MODE: postgresql
          POSTGRES_SERVER: localhost
          POSTGRES_USER: bideasy
          POSTGRES_PASSWORD: bideasy_pass
          POSTGRES_DB: bideasy_test
          JWT_SECRET_KEY: ci-test-secret-key-do-not-use-in-prod

  flutter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          cache: true
      - run: flutter pub get
        working-directory: frontend
      - run: flutter analyze --no-fatal-infos
        working-directory: frontend
      - run: flutter test
        working-directory: frontend

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, flutter]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t bideasy-backend ./backend
